                    <h3>스티브 잡스가 찍어둔 '지식의 점' 이야기</h3>
                    <p>리더 여러분, 오늘 아침 출근길은 어떠셨나요? 가끔은 빽빽한 보상 판례집이나 규정집을 보면서 '이 어려운 걸 공부한다고 당장 오늘 계약이 나오나?' 하고 마음이 지치실 때가 있을 겁니다. 오늘 아침엔 그런 우리 마음을 탁 트이게 해줄 가벼운 이야기로 문을 열어볼까 합니다.</p>

                    <p>하지만 전문가의 세계에서 헛되이 사라지는 배움은 결코 없습니다. 오늘 귀찮음을 무릅쓰고 머릿속에 꼭꼭 씹어 삼킨 예리한 지식 한 줄은, 언젠가 수십억대 자산을 가진 기업 경영자나 까다로운 고액 자산가를 대면했을 때 빛을 발하게 됩니다. 남들은 다 얼어붙어 있을 때, 리더 여러분이 과거에 정밀하게 축적해 둔 분석력을 탁 꺼내놓는 순간, 고객은 눈을 크게 뜨며 "당신이 진짜 프로군요!" 하고 손을 내밀게 될 것입니다.</p>

                    <div class="summary-box">
                        <p class="text-sm font-black text-green-800 m-0 mb-1">📢 오늘 경제 소식의 핵심 요약</p>
                        <p class="text-xs text-green-700 leading-relaxed m-0">4세대 실손의 비급여 차등제는 무분별한 과다 청구자에게 페널티를 주는 제도입니다. 옛날 실손을 4세대로 전환해 고정 비용을 대폭 줄이고, 인상 걱정 없는 비갱신형 담보를 채워 넣는 역발상 컨설팅이 정답입니다.</p>
                    </div>

                    <h3>도대체 이 정책이 왜 나왔을까요?</h3>
                    <p>요즘 금융감독원에서 연일 발표하는 4세대 실손의료보험의 '비급여 차등제' 소식 때문에 불안해하는 목소리가 많습니다. "이제 무서워서 실손 청구도 마음대로 못 하는 것 아니냐"는 우려가 가득한 지금이, 바로 우리 같은 프로들이 명쾌한 해법을 제시할 골든타임입니다.</p>
                    <p>과거에 판매된 옛날 실손보험은 혜택은 좋았지만 치명적인 허점이 있었습니다. 대다수의 선량한 가입자들은 병원에 가지 않는데, 극소수의 일부 가입자들이 비싼 비급여 도수치료나 영양제 주사를 수백 번씩 받으며 보험금을 독식했던 것이죠. 이로 인한 적자는 아무 치료도 받지 않은 선량한 가입자들이 매년 '갱신 보험료 폭탄'으로 나누어 감당해야 했습니다. 정부가 이 모순적인 구조를 깨기 위해 도입한 제도가 바로 <strong>"많이 쓴 사람은 많이 내고, 안 쓴 사람은 깎아주자"</strong>는 자동차 보험 방식의 4세대 실손 차등제입니다.</p>
                    <ul>
                        <li><strong>비급여 청구액 0원인 고객</strong>: 전체 가입자의 대부분을 차지하는 이 우량 고객분들은 다음 해 비급여 보험료의 10% 수준을 즉시 할인받습니다.</li>
                        <li><strong>비급여 수령액 연간 300만 원 초과자</strong>: 무분별하게 보험금을 남용한 분들에게는 최대 300%, 즉 3배까지 할증을 매기는 강력한 페널티를 부과합니다.</li>
                    </ul>

                    <h3>위기를 대형 계약으로 바꾸는 역발상 리밸런싱</h3>
                    <p>고객이 보험료 인상을 두려워할 때, 우리는 완벽한 자산 다이어트 처방전을 끊어주어야 합니다. 기하급수적으로 폭등하는 옛날 실손을 유지하느라 끙끙 앓는 가정을 찾아가, 4세대 실손으로 가볍게 리모델링하여 매월 새어나가는 지출을 즉각 절반 이하로 뚝 떨어뜨려 드리는 것입니다.</p>
                    <p>그리고 그렇게 아낀 아까운 가계 예산을 활용하여, <strong>내가 앞으로 병원에 백 번을 가든 천 번을 청구하든 보험료 인상이 영구적으로 동결되는 단단한 비갱신형 종합 건강 담보</strong>를 보완해 주는 것이 불황기를 이겨내는 프로들의 리스크 관리 기법입니다.</p>

                    <div class="instructor-guide">
                        <p class="text-sm font-black text-orange-800 m-0 mb-1">💡 비즈니스 소구 화법 스크립트</p>
                        <p class="text-xs text-orange-700 leading-relaxed m-0">
                            "고객님, 청구할 때마다 보험료가 오를까 봐 전전긍긍하는 불안한 실손 하나에 수십만 원씩 태우는 것은 비효율적입니다. 실손은 저렴한 4세대로 슬림하게 다이어트하여 매달 고정 비용을 아끼시고, 그 아낀 돈으로 아무리 청구해도 보험료가 단 1원도 오르지 않는 튼튼한 비갱신형 코어 울타리를 새로 만드셔야 안전합니다."
                        </p>
                    </div>
                `
            }
        ];

        // -------------------------------------------------------------
        // [자동 동기화] 날짜에 무관하게 정제된 수정 데이터를 확실하게 전수 동기화
        // -------------------------------------------------------------
        const DAILY_DATA_BANK = {};
        for (let day = 1; day <= 100; day++) {
            const motivation = SEED_MOTIVATIONS[0];
            const claimsReport = SEED_NEWS[0];
            const industryReport = SEED_INDUSTRY[0];

            DAILY_DATA_BANK[day] = {
                motivation: {
                    ...motivation,
                    text: motivation.text
                },
                claimsReport: {
                    ...claimsReport,
                    rawTitle: claimsReport.rawTitle
                },
                industryReport: {
                    ...industryReport,
                    title: industryReport.title
                }
            };
        }

        function App() {
            const [selectedNews, setSelectedNews] = useState(null);
            const [todayKST, setTodayKST] = useState("");
            const [dateStringKST, setDateStringKST] = useState("");
            const [isCopying, setIsCopying] = useState(false);

            const getKSTDateMetrics = useCallback(() => {
                const now = new Date();
                const formatter = new Intl.DateTimeFormat('ko-KR', {
                    timeZone: 'Asia/Seoul', year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric', hour12: false
                });
                const parts = formatter.formatToParts(now);
                const partValues = {};
                parts.forEach(part => { partValues[part.type] = part.value; });
                
                const year = parseInt(partValues.year, 10);
                const month = parseInt(partValues.month, 10);
                const day = parseInt(partValues.day, 10);
                const hour = parseInt(partValues.hour, 10);
                const minute = parseInt(partValues.minute, 10);
                
                let kstMoment = new Date(Date.UTC(year, month - 1, day, hour, minute));
                
                // 월~금 오전 8시 30분 기점 자동 변경 데몬 로직
                if (hour < 8 || (hour === 8 && minute < 30)) {
                    kstMoment.setUTCDate(kstMoment.getUTCDate() - 1);
                }
                
                // 주말(토, 일) 감지 시 금요일 데이터 보존 처리
                const dayOfWeek = kstMoment.getUTCDay(); // 0: 일, 6: 토
                if (dayOfWeek === 0) {
                    kstMoment.setUTCDate(kstMoment.getUTCDate() - 2);
                } else if (dayOfWeek === 6) {
                    kstMoment.setUTCDate(kstMoment.getUTCDate() - 1);
                }

                return {
                    year: kstMoment.getUTCFullYear(),
                    month: kstMoment.getUTCMonth() + 1,
                    day: kstMoment.getUTCDate(),
                    dayValue: kstMoment.getUTCDate()
                };
            }, []);

            useEffect(() => {
                const metrics = getKSTDateMetrics();
                setTodayKST(`${metrics.year}. ${String(metrics.month).padStart(2, '0')}. ${String(metrics.day).padStart(2, '0')}`);
                setDateStringKST(`${metrics.month}월 ${metrics.day}일`);
                
                const timeTracker = setInterval(() => {
                    const nextMetrics = getKSTDateMetrics();
                    setTodayKST(`${nextMetrics.year}. ${String(nextMetrics.month).padStart(2, '0')}. ${String(nextMetrics.day).padStart(2, '0')}`);
                    setDateStringKST(`${nextMetrics.month}월 ${nextMetrics.day}일`);
                }, 60000);
                return () => clearInterval(timeTracker);
            }, [getKSTDateMetrics]);

            const activeData = useMemo(() => {
                const metrics = getKSTDateMetrics();
                // 100개 무중복 고유 풀을 위한 수학적 가중치 해시 순환 결합
                const contentIndex = ((metrics.year * metrics.month + metrics.dayValue) % 100) || 1;
                return DAILY_DATA_BANK[contentIndex] || DAILY_DATA_BANK[1];
            }, [getKSTDateMetrics, todayKST]);

            useEffect(() => {
                document.body.style.overflow = selectedNews ? 'hidden' : 'unset';
                return () => { document.body.style.overflow = 'unset'; };
            }, [selectedNews]);

            const handleCopyText = (htmlContent) => {
                const cleanText = htmlContent.replace(/<[^>]*>/g, '').trim();
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(cleanText)
                        .then(() => { setIsCopying(true); setTimeout(() => setIsCopying(false), 2000); })
                        .catch(() => fallbackCopyText(cleanText));
                } else {
                    fallbackCopyText(cleanText);
                }
            };

            const fallbackCopyText = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed"; textArea.style.left = "-999999px";
                document.body.appendChild(textArea); textArea.focus(); window.scrollTo(0,0); textArea.select();
                try { document.execCommand('copy'); setIsCopying(true); setTimeout(() => setIsCopying(false), 2000); } catch (err) {}
                document.body.removeChild(textArea);
            };

            const CategoryTag = ({ type }) => {
                const configs = {
                    FSS: { label: "금융 경제 소식", color: "bg-blue-600", icon: "shield-check" },
                    CLAIMS: { label: "손해사정 판례 해석", color: "bg-red-600", icon: "scale" },
                    MOTIVATION: { label: "모닝 비즈니스 에세이", color: "bg-rose-500", icon: "flame" },
                };
                const config = configs[type] || configs.FSS;
                return (
                    <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[9px] font-black text-white uppercase tracking-wider ${config.color}`}>
                        <CustomIcon name={config.icon} size={10} /> {config.label}
                    </span>
                );
            };

            return (
                <div className="min-h-screen pb-12 bg-[#F9F9FB]">
                    <nav className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm">
                        <div className="max-w-2xl mx-auto px-4 h-16 flex items-center justify-between gap-2">
                            <div className="flex items-center gap-1.5">
                                <div className="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center shadow-md shadow-orange-200">
                                    <CustomIcon name="sun" className="text-white" size={16} />
                                </div>
                                <span className="font-black text-lg tracking-tighter uppercase text-gray-900">Leaders <span className="text-orange-500 font-medium">Insight</span></span>
                            </div>
                            <div className="text-[11px] font-bold text-gray-400 bg-gray-50 px-2.5 py-1 rounded-md border border-gray-100 shadow-inner">
                                📅 {todayKST}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-2xl mx-auto px-4 py-8 space-y-10 animate-slide-up">
                        <header className="space-y-2">
                            <div className="flex items-center gap-1.5">
                                <div className="p-1 bg-orange-100 rounded text-orange-600"><CustomIcon name="flame" size={12} /></div>
                                <span className="text-[10px] font-black text-orange-600 uppercase tracking-widest">morning boost portal</span>
                            </div>
                            <h2 className="text-2xl md:text-3xl font-black leading-tight tracking-tight text-gray-900">아침을 깨우는<br/><span className="text-orange-500">오늘의 뉴스레터</span></h2>
                            <p className="text-gray-400 font-semibold text-[11px] leading-relaxed">
                                우리 같은 프로들의 명쾌한 솔루션 도출을 위해 복잡한 보상 법리와 핵심 정책 변화를 꼭꼭 씹어서 가장 읽기 편하게 전달합니다.
                            </p>
                        </header>

                        {/* 모닝 비즈니스 에세이 카드 */}
                        <section className="group relative h-[420px] rounded-[2rem] overflow-hidden shadow-xl shadow-gray-200 bg-black cursor-pointer"
                                 onClick={() => setSelectedNews({ ...activeData.motivation, category: 'MOTIVATION', title: `${dateStringKST}의 영감 : ${activeData.motivation.text}` })}>
                            <img src={activeData.motivation.image} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 opacity-85" alt="" />
                            <div className="absolute inset-0 bg-gradient-to-t from-gray-950 via-gray-950/50 to-transparent" />
                            <div className="absolute bottom-0 left-0 p-6 w-full space-y-3">
                                <CategoryTag type="MOTIVATION" />
                                <h3 className="text-lg md:text-2xl font-black text-white leading-snug break-keep">{dateStringKST}의 영감 : {activeData.motivation.text}</h3>
                                <p className="text-white/80 text-xs leading-relaxed break-keep line-clamp-4">{activeData.motivation.subText}</p>
                                <div className="pt-2 flex items-center gap-1 text-[10px] font-black text-orange-400 uppercase tracking-widest">에세이 원문 꼭꼭 씹어 읽기 <CustomIcon name="external-link" size={10} /></div>
                            </div>
                        </section>

                        <section className="space-y-4">
                            <div className="flex items-center gap-1.5 text-gray-900 pb-1">
                                <div className="p-1.5 bg-gray-100 rounded-lg"><CustomIcon name="book-open" size={16} /></div>
                                <h3 className="font-black text-lg tracking-tight text-gray-900">오늘의 핵심 교육 매뉴얼</h3>
                            </div>
                            
                            <div className="grid grid-cols-1 gap-4">
                                <div onClick={() => setSelectedNews({ ...activeData.claimsReport, title: activeData.claimsReport.rawTitle })} className="group flex items-start gap-4 p-6 bg-white rounded-2xl border border-gray-100 hover:border-red-200 hover:shadow-xl transition-all cursor-pointer">
                                    <div className="shrink-0 w-11 h-11 rounded-xl flex items-center justify-center bg-red-50 text-red-600 group-hover:bg-red-500 group-hover:text-white transition-all"><CustomIcon name="scale" size={20} /></div>
                                    <div className="flex-1 space-y-2 min-w-0">
                                        <CategoryTag type="CLAIMS" />
                                        <h4 className="text-base font-black text-gray-900 group-hover:text-red-700 transition-colors break-keep leading-snug">{activeData.claimsReport.rawTitle}</h4>
                                        <p className="text-xs text-gray-500 leading-relaxed line-clamp-4">{activeData.claimsReport.summary}</p>
                                        <div className="pt-1 flex items-center gap-0.5 text-[10px] font-black text-red-600">친절한 판례 해석 브리핑 보기 <CustomIcon name="external-link" size={9} /></div>
                                    </div>
                                </div>

                                <div onClick={() => setSelectedNews({ ...activeData.industryReport, title: activeData.industryReport.title })} className="group flex items-start gap-4 p-6 bg-white rounded-2xl border border-gray-100 hover:border-blue-200 hover:shadow-xl transition-all cursor-pointer">
                                    <div className="shrink-0 w-11 h-11 rounded-xl flex items-center justify-center bg-blue-50 text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-all"><CustomIcon name="external-link" size={20} /></div>
                                    <div className="flex-1 space-y-2 min-w-0">
                                        <CategoryTag type="FSS" />
                                        <h4 className="text-base font-black text-gray-900 group-hover:text-blue-600 transition-colors break-keep leading-snug">{activeData.industryReport.title}</h4>
                                        <p className="text-xs text-gray-500 leading-relaxed line-clamp-4">{activeData.industryReport.summary}</p>
                                        <div className="pt-1 flex items-center gap-0.5 text-[10px] font-black text-blue-500">핵심 금융 정책 해설집 보기 <CustomIcon name="external-link" size={9} /></div>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>

                    {/* 모달 레이어 팝업 */}
                    {selectedNews && (
                        <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center p-0 md:p-4">
                            <div className="absolute inset-0 bg-gray-950/70 backdrop-blur-sm" onClick={() => setSelectedNews(null)} />
                            <div className="relative bg-white w-full max-w-2xl h-[88vh] md:h-auto md:max-h-[85vh] overflow-hidden rounded-t-3xl md:rounded-3xl shadow-2xl flex flex-col z-10 animate-slide-up">
                                <div className="sticky top-0 bg-white/95 backdrop-blur-md border-b border-gray-100 px-5 py-4 flex items-center justify-between z-20">
                                    <div className="flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-orange-500 animate-pulse" />
                                        <span className="text-[10px] font-black text-gray-400 uppercase tracking-wider">{selectedNews.category || 'NEWSLETTER'} Premium Reading</span>
                                    </div>
                                    <button onClick={() => setSelectedNews(null)} className="p-1.5 hover:bg-gray-100 rounded-xl text-gray-400"><CustomIcon name="x" size={20} /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 md:p-10 custom-scrollbar">
                                    <div className="space-y-6">
                                        <h2 className="text-xl md:text-2xl font-black text-gray-900 leading-snug break-keep">{selectedNews.title}</h2>
                                        <div className="article-body" dangerouslySetInnerHTML={{ __html: selectedNews.fullContent }} />
                                        
                                        {selectedNews.sourceUrl && (
                                            <div className="p-4 bg-slate-50 border border-slate-100 rounded-xl flex flex-col gap-3">
                                                <div className="flex items-center gap-2">
                                                    <div className="p-2 bg-white rounded-lg text-gray-400 shadow-sm"><CustomIcon name="file-text" size={16} /></div>
                                                    <div>
                                                        <p className="text-xs font-black text-gray-900">대한민국 법원 종합법률정보 판례 고증</p>
                                                        <p className="text-[10px] text-gray-400">대법원 선고 원본 데이터 연동</p>
                                                    </div>
                                                </div>
                                                <a href={selectedNews.sourceUrl} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-1.5 w-full py-2.5 bg-gray-900 text-white rounded-lg text-xs font-black hover:bg-black transition-all">공식 판결문 원본 확인하기 <CustomIcon name="external-link" size={11} /></a>
                                            </div>
                                        )}
                                        
                                        <div className="p-4 bg-orange-50/50 border-l-4 border-orange-500 text-[11px] text-gray-500 font-medium leading-relaxed rounded-r-xl">
                                             💡 본 레터는 우리 같은 프로들의 지식 경쟁력과 깊이 있는 소양 증진을 목적으로 매일 정성스레 발행됩니다. 동료 리더 그룹의 세미나 및 미팅 소구 자료로 편안하게 인용하여 활용하시기 바랍니다.
                                        </div>

                                        <div className="pt-6 border-t border-gray-100 space-y-3">
                                             <button onClick={() => handleCopyText(selectedNews.fullContent)} className="w-full flex items-center justify-center gap-2 py-4 bg-orange-500 text-white font-black rounded-xl hover:bg-orange-600 transition-all shadow-md text-sm">
                                                 <CustomIcon name={isCopying ? "check" : "copy"} size={14} />
                                                 {isCopying ? "텍스트가 클립보드에 복사되었습니다!" : "본문 내용 전체 복사하기 (미팅 제안 / 가이드 배포용)"}
                                             </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
