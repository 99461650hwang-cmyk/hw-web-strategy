<body>

    <script type="text/babel">
        // 핵심 React 훅 구조분해할당 완료 (useMemo 에러 철저 방지)
        const { useState, useEffect, useCallback, useMemo } = React;

        // 주간 비밀번호 고정
        const WEEKLY_PASSWORD = "2026";

        // 인라인 SVG 아이콘 컴포넌트
        const CustomIcon = ({ name, size = 20, className = "" }) => {
            const icons = {
                sun: <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z" />,

                copy: <><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>,
                check: <path d="M20 6L9 17l-5-5" />,

                "file-text": <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M16 13H8 M16 17H8 M10 9H8" />,
                "external-link": <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6 M15 3h6v6 M10 14L21 3" />,

                eye: <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />,
                "eye-off": <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />,
                quote: <path d="M3 21c3 0 7-1 7-8V5H3v8h4c0 4.41-3.59 8-8 8zm13 0c3 0 7-1 7-8V5h-7v8h4c0 4.41-3.59 8-8 8z" />

            return (

            );
        };

        // 1일부터 31일까지의 무인 로테이션 데이터 뱅크 선언
        const DAILY_DATA_BANK = {};

        // 중복이 전혀 없고 리더님의 위상에 최적화된 완전히 새로운 고가치 모닝 야화 시드 리스트
        const SEED_MOTIVATIONS = [
            {
                image: "https://images.unsplash.com/photo-1506012787146-f92b2d7d6d96?q=80&w=1200&auto=format&fit=crop",
                text: "절망의 금문교 아래 설치된 '기적의 안전 그물'",
                subText: "건설 초기 잦은 추락 사고로 악명 높았던 샌프란시스코의 금문교. 인부들의 공포를 지우고 작업 속도를 폭발적으로 올린 비밀.",
                fullContent: `
                    <h3>[모닝 야화] 금문교 아래에 설치된 13만 달러짜리 심리 장막</h3>
                    <p>안녕하세요 리더님! 상쾌한 아침 기운과 함께 오늘 아침 리더님께 배달해 드릴 새로운 영감은 샌프란시스코의 상징 '금문교(Golden Gate Bridge)'의 건설 비화입니다. 1930년대 중반, 거친 바람과 자욱한 안개로 가득한 지협 속에서 60층 높이의 상판을 설치하는 공사는 그 자체로 인부들에게 극심한 절망이자 죽음의 문턱이었습니다.</p>
                    <p>발 하나만 잘못 디디면 그대로 성난 파도로 추락해 영영 돌아오지 못했기에, 작업 속도는 지지부진했고 공사장은 늘 팽팽한 고성과 공포심으로 굳어 있었습니다. 이때 총설계자 조셉 스트라우스는 당시로선 천문학적인 거금이었던 13만 달러를 전격 투자하여 다리 아래에 거대한 밧줄로 짠 **안전 그물**을 설치하는 파격적인 모험을 단행했습니다.</p>
                    <p>결과는 우주적이었습니다. 실제로 공사 도중 중심을 잃고 추락하던 인부 19명이 이 그물에 걸려 전원 무사히 목숨을 건졌으며, 이들은 스스로를 '지옥에서 돌아온 클럽(Halfway to Hell Club)'이라 칭했습니다. 더욱 경이로운 점은 안전망이 눈앞에 존재한다는 안도감 하나만으로 인부들의 추락 공포가 완전히 증발하여, **다리 전체의 공사 능률과 건설 진척 속도가 이전 대비 무려 25% 이상 폭발적으로 급상승**했다는 역사적 사실입니다.</p>
                    <p><strong>리더님이 전달하는 보장자산의 본질은 바로 '금문교의 그물'입니다.</strong><br/>우리가 제안하는 보험은 단순히 큰 병에 걸렸을 때 나오는 '보험금'이라는 현금 가치에 머물지 않습니다. 다리 밑에 튼튼한 그물이 있음을 아는 인부들이 두려움 없이 기백 넘치게 교량을 활보하듯, 고객들은 리더님이라는 든든한 파트너가 짜놓은 '보장자산'이 뒤를 받쳐준다는 깊은 신뢰가 있기 때문에 매일 매일의 삶에 당당히 직면하고 더 안전하고 창조적인 도전을 할 수 있게 되는 것입니다. 오늘도 고객의 삶 밑바닥에 가장 든든하고 우아한 인생 그물을 설계하는 명예로운 리더님들을 뜨겁게 격려합니다!</p>
                `
            },
            {
                image: "https://images.unsplash.com/photo-1554124494-192a6c867140?q=80&w=1200&auto=format&fit=crop",
                text: "미켈란젤로가 차가운 대리석에서 발견한 '다비드'",
                subText: "거칠고 쓸모없어 버려졌던 5미터짜리 거대 돌덩어리 속에서 어떻게 인류 역사상 가장 아름다운 조각상이 탄생했을까요?",
                fullContent: `
                    <h3>[모닝 야화] 빼기의 예술: 대리석 조각 속에 이미 존재하던 완벽함</h3>
                    <p>리더님, 이탈리아 피렌체의 아카데미아 미술관에 서서 다비드 조각상을 마주한 관람객들은 그 압도적인 혈관의 묘사와 근육의 긴장감에 숨을 죽이게 됩니다. 당시 이 다비드상의 재료가 되었던 5.5미터가 넘는 대리석 원석은 원래 다른 조각가가 조각을 하려다 흠집을 심하게 내어 쓰레기장 구석에 40년 가까이 흉물스럽게 방치되어 있던 버림받은 돌덩이였습니다.</p>
                    <p>모두가 불가능하다고 고개를 저었지만, 천재 조각가 미켈란젤로는 망치와 정을 들고 그 돌 앞에 섰습니다. 그리고 불과 몇 달 만에 세상을 바꾼 다비드를 소환해 냈죠. 훗날 기자가 그 불후의 명작을 빚어낸 영감의 비결을 묻자 미켈란젤로는 이렇게 답했습니다. **"다비드는 이미 대리석 속에 완전히 완성된 채로 숨어 있었습니다. 나는 단지 다비드를 가로막고 있던 불필요한 외곽의 거친 돌들을 세심하게 깎아내어 비워주었을 뿐입니다."**</p>
                    <p><strong>고객을 대면하여 컨설팅을 수행하는 리더님의 작업도 이와 같습니다.</strong><br/>훌륭한 재무 상담은 고객에게 새로운 약관과 생소한 특약을 억지로 덧붙이고 채워 넣는 작업이 아닙니다. 고객의 삶을 자세히 들여다보면, 이미 그들의 잠재력과 행복은 대리석처럼 그 자체로 완벽합니다. 다만 살아가며 마주할 리스크와 거품 낀 불필요한 지출, 중복된 군더더기들이 그들의 찬란한 미래를 가로막고 있을 뿐입니다. 미켈란젤로처럼 불필요한 리스크의 껍데기를 정교하게 깎아내어 고객의 인생 속 가장 빛나는 '완벽한 보장 자산'을 조각해 내는 품격 있는 리더로 서시기를 응원합니다.</p>
                `
            },
            {
                image: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=1200&auto=format&fit=crop",
                text: "97%의 오차 속에서 묵묵히 이루어낸 아폴로 11호의 달 착륙",
                subText: "아폴로 11호가 지구에서 달까지 가는 비행시간 동안 원래 가고자 했던 궤도에 서 있었던 비율은 고작 3%에 불과했습니다.",
                fullContent: `
                    <h3>[모닝 야화] 끊임없는 미세 조정의 힘: 궤도를 이탈하는 우주선</h3>
                    <p>리더님, 1969년 인류 최초로 닐 암스트롱을 태우고 달에 착륙한 '아폴로 11호'의 위대한 여정을 기억하실 겁니다. 놀라운 천문학적 정밀 과학이 총동원된 비행기였기에 지구를 떠난 후 한 치의 오차도 없이 우주 활주로를 똑바로 나아갔을 것 같지만, NASA의 사후 기록은 우리의 통념을 정면으로 깨뜨립니다.</p>
                    <p>우주선은 우주의 중력풍, 미세 운석, 태양풍의 끊임없는 저항 때문에 **비행 시간의 무려 97% 이상을 계획된 원래의 항로에서 이탈해 갈지자(之)로 비행**하고 있었습니다. 만약 NASA 컴퓨터와 조종사들이 손을 놓고 방관했다면 우주선은 광막한 우주 미아가 되어 암흑 속으로 사라졌을 것입니다. 달 착륙을 성공시켰던 진정한 기술력은 '오차가 없는 것'이 아니라, 경로에서 벗어날 때마다 실시간으로 자이로스코프와 추력기를 가동해 끊임없이 **미세 궤도 조정(Trajectory Correction)**을 수행해 나간 조용한 인내와 보정이었습니다.</p>
                    <p><strong>고객의 인생 재무 궤도 역시 우주의 항해와 같습니다.</strong><br/>처음 만나 꼼꼼하게 체결한 보장 설계 포트폴리오가 평생 완벽하게 순항할 수는 없습니다. 고객의 결혼, 출산, 이직, 갑작스러운 금융 시장 변동 등 매 순간 불어오는 거센 인생의 중력풍이 궤도를 사정없이 흔들기 때문입니다. 그렇기에 리더님은 단순한 '상품 판매자'에 멈춰서는 안 됩니다. 고객의 생애 주기 곁을 지키며 흔들릴 때마다 조용히 보장 자산을 업데이트해 주고 원래 약속했던 '안도감의 종착지'로 안착하도록 끊임없이 손을 잡아 조율해 주는 위대한 우주 관제소의 리더가 되어주셔야 합니다.</p>
                `
            },
            {
                image: "https://images.unsplash.com/photo-1516979187457-637abb4f9353?q=80&w=1200&auto=format&fit=crop",
                text: "인듀어런스호의 극한 침몰 속에서 피어난 '전원 생존'의 기적",
                subText: "남극의 두꺼운 얼음 속에 우주처럼 격리된 634일의 암흑기. 단 한 명의 희생자도 없이 전원 무사 귀환시킨 새클턴의 결정적 비결.",
                fullContent: `

                sourceUrl: "https://scourt.go.kr",

            {

                summary: "초고령화 시대에 발맞춰 진단비 보장과 실제 고품격 장례 및 전속 전문 가사 간병 케어망을 유기적으로 연계한 신규 패키지 특약 론칭.", 
                fullContent: `
                    <h3>[한화 뉴스레터] 단순 치료비 보장을 넘어 라이프 서비스의 완전한 동행으로</h3>

                    <p><strong>2. 경쟁 우위의 세일즈 핵심 스피치</strong><br/>"고객님, 나이 들어 갑자기 병원 신세를 질 때 자녀들에게 가장 큰 미안함은 간병 비용과 시간입니다. 한화손해보험의 프리미엄 맞춤 실버 담보는 단순히 돈 몇 푼 쥐여주고 떠나는 것이 아니라, 본사의 탄탄한 상조 인력망과 간병 파견 전문팀이 고객님의 가정에 치료부터 돌봄까지 직접 발 벗고 나서서 동행해 드리는 차원 높은 라이프 서비스입니다. 인생의 가치를 저와 함께 든든하게 선점해 보세요."</p>

                sourceUrl: "https://www.fss.or.kr",
                fullContent: `
                    <h3>[정책 브리핑 레터] 지속 가능한 의료 안전망의 핵심, 4세대 실손의 진실</h3>
                    <p>금융감독원과 보험사들은 최근 기존 1~3세대 실손보험료 폭탄 갱신 주기를 맞아 고통받는 가입자들을 위해 **'4세대 실손보험 전환 유도 지원 할인 혜택'**을 확대 배포하고, 동시에 건전한 보장 청구 유도를 위한 정밀 안내 지침을 내놓았습니다.</p>
                    <p><strong>1. 4세대 실손보험의 구조적 가치</strong><br/>많은 소비자들이 4세대 실손은 보장이 안 좋고 자부담이 높다며 무조건 기피하지만, 실상은 다릅니다. 병원 방문 횟수가 지극히 정상적인 우량 고객들에게는 매달 지출하는 기존 보험료를 최대 50%~70%까지 극적으로 다이어트하여 매월 고정 가계비를 아껴주는 훌륭한 재무 솔루션입니다. 또한 무분별한 도수치료 오남용으로 인한 다른 가입자들의 손해율 분담 책임에서 철저히 격리되어 장기적으로 갱신율이 가장 안정적이라는 장점이 뚜렷합니다.</p>
                    <p><strong>2. 리더님의 정직한 소구 전략</strong><br/>"고객님, 쓰지도 않는 최고급 뷔페 티켓을 매달 비싼 돈 주고 무조건 안고 가실 이유가 없습니다. 병원에 자주 가시지 않는다면, 필요한 만큼만 합리적으로 내고 평생 든든하게 유지하는 실속형 4세대 실손으로 체질을 개선하시는 것이 불황기 최고의 가계 절약 비법입니다. 남는 비용으로 핵심 암 진단비의 든든한 쉴드를 추가하시는 방향을 제가 맞춤 제안해 드립니다."</p>
                ` 
            }
        ];

        // 31일 콘텐츠 생성용 매커니즘
        for (let day = 1; day <= 31; day++) {
            const slides = [
                SEED_MOTIVATIONS[(day - 1) % SEED_MOTIVATIONS.length],
                SEED_MOTIVATIONS[day % SEED_MOTIVATIONS.length],
                SEED_MOTIVATIONS[(day + 1) % SEED_MOTIVATIONS.length]
            ];
            
            const economy = SEED_ECONOMY[(day - 1) % SEED_ECONOMY.length];
            
            const newsList = [
                { ...SEED_NEWS[0], title: `[${day}일의 보상실무] ${SEED_NEWS[0].title.substring(5)}` },
                { ...SEED_NEWS[1], title: `[${day}일의 판례특보] ${SEED_NEWS[1].title.substring(5)}` },
                { ...SEED_NEWS[2], title: `[${day}일의 한화소식] ${SEED_NEWS[2].title.substring(5)}` },
                { ...SEED_NEWS[3], title: `[${day}일의 금감원뉴스] ${SEED_NEWS[3].title.substring(5)}` }
            ];

            DAILY_DATA_BANK[day] = {
                motivation: { slides },
                economy,
                newsList
            };
        }

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [passwordError, setPasswordError] = useState(false);
            const [showPassword, setShowPassword] = useState(false);

            const [selectedNews, setSelectedNews] = useState(null);
            const [currentSlide, setCurrentSlide] = useState(0);
            const [progress, setProgress] = useState(0);
            const [todayKST, setTodayKST] = useState("");
            const [isCopying, setIsCopying] = useState(false);

            // 실시간 날짜 추출 및 08:30 기준 이전일/당일자 매핑 세트 동적 판정 로직
            const getKSTDateMetrics = useCallback(() => {
                const now = new Date();
                const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
                const kstDate = new Date(utc + (3600000 * 9)); // KST (UTC+9)

                const currentHour = kstDate.getHours();
                const currentMinute = kstDate.getMinutes();

                let activeDate = new Date(kstDate);
                if (currentHour < 8 || (currentHour === 8 && currentMinute < 30)) {
                    activeDate.setDate(activeDate.getDate() - 1);
                }

                return {
                    year: activeDate.getFullYear(),
                    month: String(activeDate.getMonth() + 1).padStart(2, '0'),
                    day: String(activeDate.getDate()).padStart(2, '0'),
                    dayValue: activeDate.getDate() // 1 ~ 31
                };
            }, []);

            useEffect(() => {
                const metrics = getKSTDateMetrics();
                setTodayKST(`${metrics.year}. ${metrics.month}. ${metrics.day}`);
                
                const timeTracker = setInterval(() => {
                    const nextMetrics = getKSTDateMetrics();
                    setTodayKST(`${nextMetrics.year}. ${nextMetrics.month}. ${nextMetrics.day}`);
                }, 60000);
                return () => clearInterval(timeTracker);
            }, [getKSTDateMetrics]);

            // 오늘 자 매핑된 안전 콘텐츠 세트 추출 (31일 데이터 완벽 격리)
            const activeData = useMemo(() => {
                const metrics = getKSTDateMetrics();
                return DAILY_DATA_BANK[metrics.dayValue] || DAILY_DATA_BANK[1];
            }, [getKSTDateMetrics, todayKST]);

            // 동기부여 명언 자동 순환 슬라이더 엔진 (8초 지속)
            useEffect(() => {
                if (!isAuthenticated) return;
                const slideDuration = 8000; 
                const interval = 50;
                const step = (interval / slideDuration) * 100;

                const timer = setInterval(() => {
                    setProgress(prev => {
                        if (prev >= 100) {
                            setCurrentSlide(s => (s + 1) % activeData.motivation.slides.length);
                            return 0;
                        }
                        return prev + step;
                    });
                }, interval);

                return () => clearInterval(timer);
            }, [isAuthenticated, activeData]);

            // 모달 팝업이 활성화되었을 때, 배경 Body 스크롤을 완벽 차단하는 고성능 이펙트
            useEffect(() => {
                if (selectedNews) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = 'unset';
                }
                return () => {
                    document.body.style.overflow = 'unset';
                };
            }, [selectedNews]);

            // 비밀번호 검증 핸들러
            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (passwordInput === WEEKLY_PASSWORD) {
                    setIsAuthenticated(true);
                    setPasswordError(false);
                } else {
                    setPasswordError(true);
                    setTimeout(() => setPasswordError(false), 800);
                    setPasswordInput("");
                }
            };

            // HTML 태그 제거 후 클립보드 안전 복사
            const handleCopyText = (htmlContent) => {
                const cleanText = htmlContent.replace(/<[^>]*>/g, '').trim();
                
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(cleanText)
                        .then(() => {
                            setIsCopying(true);
                            setTimeout(() => setIsCopying(false), 2000);
                        })
                        .catch(() => fallbackCopyText(cleanText));
                } else {
                    fallbackCopyText(cleanText);
                }
            };

            const fallbackCopyText = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    setIsCopying(true);
                    setTimeout(() => setIsCopying(false), 2000);
                } catch (err) {
                    console.error("복사에 실패했습니다.", err);
                }
                document.body.removeChild(textArea);
            };

            const CategoryTag = ({ type }) => {
                const configs = {
                    HANWHA: { label: "한화 소식", color: "bg-orange-500", icon: "sun" },
                    FSS: { label: "금감원 정책", color: "bg-blue-600", icon: "shield-check" },
                    CLAIMS: { label: "보상 실무 리포트", color: "bg-red-600", icon: "scale" },
                    ECONOMY: { label: "생활 경제", color: "bg-emerald-600", icon: "trending-up" },
                    MOTIVATION: { label: "모닝 야화", color: "bg-rose-500", icon: "flame" },
                };
                const config = configs[type] || configs.HANWHA;
                return (
                    <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-black text-white uppercase tracking-wider ${config.color}`}>
                        <CustomIcon name={config.icon} size={11} />
                        {config.label}
                    </span>
                );
            };

            // 비밀번호 락 스크린 UI 
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#F3F4F6] px-6">
                        <div className={`w-full max-w-md bg-white p-10 rounded-[3rem] shadow-2xl transition-all duration-300 ${passwordError ? 'animate-shake ring-4 ring-red-500' : 'border border-gray-100'}`}>
                            <div className="text-center space-y-4 mb-8">
                                <div className="w-16 h-16 bg-orange-500 rounded-3xl mx-auto flex items-center justify-center shadow-xl shadow-orange-200">
                                    <CustomIcon name="lock" className="text-white" size={28} />
                                </div>
                                <h2 className="text-2xl font-black text-gray-900 tracking-tight">Leaders <span className="text-orange-500">Insight</span></h2>
                                <p className="text-sm text-gray-400 font-semibold leading-relaxed">
                                    본 사이트는 소속 지점 리더 전용 포털입니다.<br/>
                                    콘텐츠 보호를 위해 이번 주 보안 코드를 입력해 주세요.
                                </p>
                            </div>

                            <form onSubmit={handlePasswordSubmit} className="space-y-6">
                                <div className="relative">
                                    <input 
                                        type={showPassword ? "text" : "password"}
                                        placeholder="비밀번호 4자리 입력"
                                        maxLength={4}
                                        value={passwordInput}
                                        onChange={(e) => setPasswordInput(e.target.value.replace(/[^0-9]/g, ''))}
                                        className="w-full px-6 py-4 bg-gray-50 border border-gray-200 rounded-2xl text-center text-lg font-bold tracking-widest focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all"
                                        autoFocus
                                    />
                                    <button 
                                        type="button"
                                        onClick={() => setShowPassword(!showPassword)}
                                        className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 p-1"
                                    >
                                        <CustomIcon name={showPassword ? "eye-off" : "eye"} size={20} />
                                    </button>
                                </div>
                                {passwordError && (
                                    <p className="text-center text-xs text-red-600 font-bold animate-pulse">
                                        ⚠️ 비밀번호가 일치하지 않습니다. 다시 입력해 주세요.
                                    </p>
                                )}
                                <button 
                                    type="submit"
                                    className="w-full py-4.5 bg-gray-900 hover:bg-black text-white rounded-2xl font-black text-sm tracking-widest uppercase transition-all shadow-lg active:scale-95"
                                >
                                    보안 해제 및 입장
                                </button>
                            </form>
                            <div className="mt-8 text-center">
                                <span className="text-[10px] font-black text-gray-300 uppercase tracking-widest">Leaders Insight Protection System</span>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20 bg-[#FDFDFD]">
                    {/* GNB 영역 */}
                    <nav className="sticky top-0 z-50 bg-white/95 backdrop-blur-xl border-b border-gray-100">
                        <div className="max-w-2xl mx-auto px-6 h-18 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="w-9 h-9 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg shadow-orange-200">
                                    <CustomIcon name="sun" className="text-white" size={18} />
                                </div>
                                <span className="font-black text-xl tracking-tighter uppercase">Leaders <span className="text-orange-500 font-medium">Insight</span></span>
                            </div>
                            <div className="flex items-center gap-2 px-3.5 py-2 bg-gray-50 rounded-full border border-gray-100">
                                <CustomIcon name="clock" className="text-orange-500" size={13} />
                                <span className="text-[10.5px] font-black text-gray-500 uppercase tracking-tight animate-pulse">
                                    {todayKST} | 08:30 AM JUST UPDATED
                                </span>
                            </div>
                        </div>
                    </nav>

                    {/* 메인 콘텐츠 영역 */}
                    <main className="max-w-2xl mx-auto px-6 py-10 space-y-16 animate-slide-up">
                        <header className="space-y-4">
                            <div className="flex items-center gap-2">
                                <div className="p-1.5 bg-orange-50 rounded-lg text-orange-600">
                                    <CustomIcon name="flame" size={14} />
                                </div>
                                <span className="text-[11px] font-black text-orange-600 uppercase tracking-[0.25em]">Morning Insight Letter</span>
                            </div>
                            <h2 className="text-4xl font-black leading-tight tracking-tight text-gray-900">
                                프로 리더님을 위한<br/><span className="text-orange-500">오늘 아침의 레터</span>
                            </h2>
                            <p className="text-gray-400 font-semibold text-sm leading-relaxed max-w-md">
                                {todayKST} 오전 8시 30분, 손해사정 실무 판례 및 법률 정보가 31일 무인 자동 업데이트 필터에 의해 정격 매핑되었습니다.
                            </p>
                        </header>

                        {/* 3단계 순환식 동기부여 야화 카드뉴스 */}
                        <section className="relative h-[550px] rounded-[3.5rem] overflow-hidden shadow-2xl shadow-gray-200 bg-black">
                            <div className="absolute top-8 left-0 w-full px-8 flex gap-2 z-20">
                                {activeData.motivation.slides.map((_, idx) => (
                                    <div key={idx} className="h-1 flex-1 bg-white/20 rounded-full overflow-hidden">
                                        <div 
                                            className="h-full bg-orange-500"
                                            style={{ 
                                                width: idx === currentSlide ? `${progress}%` : idx < currentSlide ? '100%' : '0%',
                                                transition: idx === currentSlide ? 'none' : 'width 0.2s ease'
                                            }}
                                        />
                                    </div>
                                ))}
                            </div>

                            {activeData.motivation.slides.map((slide, idx) => (
                                <div 
                                    key={idx}
                                    className={`absolute inset-0 transition-all duration-1000 transform ${idx === currentSlide ? 'opacity-100 scale-100' : 'opacity-0 scale-105 pointer-events-none'}`}
                                >
                                    <img src={slide.image} className="w-full h-full object-cover" alt="" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-black/45 to-transparent" />
                                    
                                    <div className="absolute bottom-0 left-0 p-12 w-full space-y-8">
                                        <div className="space-y-4">
                                            <div className="inline-flex items-center gap-2 px-3 py-1 bg-white/10 backdrop-blur-md border border-white/20 rounded-full text-[10px] font-bold text-white uppercase tracking-widest">
                                                <CustomIcon name="quote" className="text-orange-400" size={12} /> Morning Hidden Story
                                            </div>
                                            <h3 className="text-2xl md:text-3xl font-black text-white leading-tight break-keep">{slide.text}</h3>
                                            <p className="text-white/80 text-base font-medium leading-relaxed break-keep line-clamp-3">{slide.subText}</p>
                                        </div>
                                        
                                        <div className="pt-2">
                                            <button 
                                                onClick={() => setSelectedNews({ ...slide, category: 'MOTIVATION', title: slide.text })}
                                                className="w-full flex items-center justify-center gap-3 py-4 bg-white text-gray-900 rounded-2xl font-black text-sm hover:bg-orange-500 hover:text-white transition-all shadow-xl active:scale-95"
                                            >
                                                스토리 전체 읽기 <CustomIcon name="external-link" size={14} />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </section>

                        {/* 생활 경제 섹션 */}
                        <section className="space-y-6">
                            <div className="flex items-center gap-2 text-emerald-600">
                                <div className="p-2 bg-emerald-50 rounded-xl"><CustomIcon name="trending-up" size={20} /></div>
                                <h3 className="font-black text-2xl tracking-tight text-gray-900">생활 경제 인사이트</h3>
                            </div>
                            <div 
                                onClick={() => setSelectedNews({ ...activeData.economy, category: 'ECONOMY' })}
                                className="group p-10 bg-white border border-gray-100 rounded-[3rem] shadow-xl shadow-gray-100/50 cursor-pointer transition-all hover:-translate-y-1 hover:border-emerald-200"
                            >
                                <div className="space-y-5">
                                    <CategoryTag type="ECONOMY" />
                                    <h4 className="text-2xl font-black text-gray-900 leading-snug group-hover:text-emerald-700 transition-colors">{activeData.economy.title}</h4>
                                    <p className="text-gray-500 text-base font-semibold leading-relaxed line-clamp-2">{activeData.economy.summary}</p>
                                    <div className="pt-2 flex items-center gap-1 text-xs font-black text-emerald-600 uppercase tracking-widest">
                                        상세 인사이트 보기 <CustomIcon name="external-link" size={13} />
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* 업계 데일리 리포트 섹션 */}
                        <section className="space-y-6">
                            <div className="flex items-center gap-2 text-gray-900">
                                <div className="p-2 bg-gray-100 rounded-xl"><CustomIcon name="book-open" size={20} /></div>
                                <h3 className="font-black text-2xl tracking-tight text-gray-900">보험업계 데일리 리포트</h3>
                            </div>
                            <div className="grid grid-cols-1 gap-6">
                                {activeData.newsList.map((news, idx) => (
                                    <div 
                                        key={idx}
                                        onClick={() => setSelectedNews(news)}
                                        className="group flex flex-col md:flex-row items-start gap-6 p-8 bg-white rounded-[3rem] border border-gray-100 hover:border-orange-200 hover:shadow-xl transition-all cursor-pointer"
                                    >
                                        <div className={`shrink-0 w-14 h-14 rounded-2xl flex items-center justify-center transition-all ${
                                            news.category === 'CLAIMS' ? 'bg-red-50 text-red-600' : 'bg-gray-50 text-gray-400'
                                        } group-hover:bg-orange-500 group-hover:text-white`}>
                                            <CustomIcon name={news.category === 'HANWHA' ? 'sun' : news.category === 'FSS' ? 'shield-check' : 'scale'} size={24} />
                                        </div>
                                        <div className="flex-1 space-y-3">
                                            <CategoryTag type={news.category} />
                                            <h4 className="text-xl font-black text-gray-900 group-hover:text-orange-600 transition-colors break-keep">{news.title}</h4>
                                            <p className="text-sm text-gray-400 font-semibold leading-relaxed italic line-clamp-1">{news.summary}</p>
                                        </div>
                                        <div className="self-center p-2 rounded-xl bg-gray-50 group-hover:bg-orange-50 text-gray-300 group-hover:text-orange-500 transition-all">
                                            <CustomIcon name="external-link" size={16} />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    {/* 푸터 영역 */}
                    <footer className="py-20 text-center border-t border-gray-100 max-w-2xl mx-auto px-6">
                        <div className="space-y-4">
                            <div className="w-8 h-8 bg-gray-100 rounded-xl flex items-center justify-center mx-auto text-gray-400">
                                <CustomIcon name="sun" size={16} />
                            </div>
                            <p className="text-[11px] font-black text-gray-400 uppercase tracking-[0.4em]">Leaders Insight Portal</p>
                            <p className="text-[9.5px] font-bold text-gray-300 uppercase tracking-widest">
                                © {todayKST.split('.')[0]} Leaders Insight System. All contents are highly confidential and protected.
                            </p>
                        </div>
                    </footer>

                    {/* 모달 팝업 상세창 */}
                    {selectedNews && (
                        <div className="fixed inset-0 z-[100] flex items-start md:items-center justify-center p-0 md:p-6 lg:p-12">
                            {/* 배경 딤드 레이어 */}
                            <div className="absolute inset-0 bg-gray-950/80 backdrop-blur-md animate-fade-in" onClick={() => setSelectedNews(null)} />
                            
                            {/* 모달 본체 */}
                            <div className="relative bg-white w-full max-w-4xl h-full md:h-auto md:max-h-[90vh] overflow-hidden rounded-none md:rounded-[3.5rem] shadow-2xl animate-in slide-in-from-bottom-20 duration-500 flex flex-col z-10">
                                <div className="sticky top-0 bg-white/95 backdrop-blur-md border-b border-gray-100 px-8 py-5 flex items-center justify-between z-20">
                                    <div className="flex items-center gap-4">
                                        <span className={`w-3 h-3 rounded-full ${selectedNews.category === 'CLAIMS' ? 'bg-red-600 animate-pulse' : 'bg-orange-500'}`} />
                                        <span className="text-xs font-black text-gray-400 uppercase tracking-widest">{selectedNews.category} Report</span>
                                    </div>
                                    <button onClick={() => setSelectedNews(null)} className="p-2.5 hover:bg-gray-100 rounded-2xl transition-all text-gray-400"><CustomIcon name="x" size={24} /></button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-8 md:p-16 lg:p-20 custom-scrollbar">
                                    <div className="max-w-3xl mx-auto">
                                        <h2 className="text-3xl md:text-4.5xl font-black text-gray-900 leading-[1.15] mb-10 break-keep">{selectedNews.title}</h2>
                                        
                                        {/* 뉴스 본문 내용 마크다운식 렌더링 */}
                                        <div className="article-body" dangerouslySetInnerHTML={{ __html: selectedNews.fullContent }} />
                                        
                                        {/* 판례 출처 링크 */}
                                        {selectedNews.sourceUrl && (
                                            <div className="mt-12 p-8 bg-slate-50 border border-slate-100 rounded-[2rem] flex flex-col md:flex-row items-center justify-between gap-6">
                                                <div className="flex items-center gap-4">
                                                    <div className="p-3 bg-white rounded-xl text-gray-400 shadow-sm"><CustomIcon name="file-text" size={20} /></div>
                                                    <div>
                                                        <p className="text-sm font-black text-gray-900">공식 출처 법적 효력 판결문 확인</p>
                                                        <p className="text-xs text-gray-400">대법원 종합법률정보 및 금감원 원문 자료를 확인하세요.</p>
                                                    </div>
                                                </div>
                                                <a 
                                                    href={selectedNews.sourceUrl} 
                                                    target="_blank" 
                                                    rel="noopener noreferrer"
                                                    className="flex items-center gap-2 px-6 py-3 bg-gray-900 text-white rounded-xl text-xs font-black hover:bg-black transition-all"
                                                >
                                                    원문 페이지 이동 <CustomIcon name="external-link" size={14} />
                                                </a>
                                            </div>
                                        )}

                                        {/* 보상 관련 필수 고지 의무 영역 */}
                                        <div className="mt-8 p-6 bg-red-50/80 border-l-4 border-red-500 text-sm text-red-800 font-bold leading-relaxed rounded-r-2xl">
                                             ⚠️ 필수 고지 사항: 본 레터에 기술된 보상 청구 및 수리 사례는 판례 해석을 기반으로 작성되었습니다.<br/>
                                             지점 리더님은 고객 상담 시 실제 보상 여부 및 지급 한도액은 반드시 가입하신 개별 계약 상품의 약관 전문 및 가입 담보, 보상과의 최종 심사 결과에 따른다는 문구를 항상 명확히 고지하여 주십시오.
                                        </div>

                                        {/* 내용 복사 버튼 영역 */}
                                        <div className="mt-20 pt-12 border-t border-gray-100">
                                             <button 
                                                onClick={() => handleCopyText(selectedNews.fullContent)} 
                                                className="w-full flex items-center justify-center gap-3 py-5 bg-orange-500 text-white font-black rounded-[2rem] hover:bg-orange-600 transition-all shadow-2xl shadow-orange-200 active:scale-95 text-base"
                                             >
                                                 <CustomIcon name={isCopying ? "check" : "copy"} size={18} />
                                                 {isCopying ? "클립보드 복사 완료!" : "본문 전체 내용 복사하기 (고객 전송용)"}
                                             </button>
                                             <p className="mt-4 text-center text-[10.5px] text-gray-400 font-bold uppercase tracking-widest">
                                                 * 회사 보안 관리 지침에 따라 외부 SNS 자동 공유 및 보관 기능은 제한되며, 사적인 상담용 텍스트 인용만 허용됩니다.
                                             </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
