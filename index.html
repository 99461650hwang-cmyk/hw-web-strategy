        const SEED_MOTIVATIONS = [
            {
                id: 1,
                text: "지금 당장 무의미해 보이는 노력이 훗날 거대한 기회로 연결되는 순간",
                image: "https://images.unsplash.com/photo-1506012787146-f92b2d7d6d96?q=80&w=600&auto=format&fit=crop",
                subText: "대학을 자퇴한 청년이 아무 쓸모도 없어 보이던 서체 디자인 수업에 호기심으로 들어갔습니다. 10년 뒤, 그 작은 배움의 조각이 컴퓨터 서체 역사를 바꾼 매킨토시 개발의 밑바탕이 되었습니다. 오늘 우리가 들여다보는 깊이 있는 약관 한 줄이 훗날 중요한 비즈니스 결합의 순간에 인생을 바꿀 강력한 힘으로 되살아납니다.",
                fullContent: `
                    <h3>[모닝 브리핑] 일상에 찍어두는 작은 배움의 점들이 연결되는 원리</h3>
                    <p>리더 여러분, 안녕하십니까. 오늘 아침은 매일 마주하는 지표 분석과 빽빽하게 얽혀 있는 규정집을 검토하면서 한 번쯤 가졌을 법한 고민들을 조용히 나누며 시작해보고자 합니다. "지금 하고 있는 이 세부적인 연구와 지식 습득이 정말 미래에 큰 차이를 만들어낼 수 있을까?" 하는 의문 말입니다.</p>
                    <p>우리에게도 너무나 친숙한 혁신의 아이콘, 스티브 잡스의 젊은 시절 이야기에서 그 해답을 찾아볼 수 있습니다. 잡스는 대학교에 입학한 지 얼마 되지 않아 학업의 방향을 고민하며 자퇴를 결심했습니다. 정규 교육 과정의 울타리를 벗어난 그는, 오히려 이전에는 눈여겨보지 않았던 다양한 배움의 기회들을 마주하게 되었죠. 그중 하나가 바로 캠퍼스 구석에서 우연히 발견한 <strong>서체 디자인과 정밀 레이아웃에 관한 청강 수업</strong>이었습니다.</p>
                    <p>그는 그곳에서 글자의 비율과 구조, 자간과 행간이 만들어내는 시각적 균형감, 그리고 독자의 눈이 가장 편안하게 텍스트를 인지하는 레이아웃의 원리를 깊이 있게 파고들었습니다. 사실 그 당시 주변에서는 "당장 취업이나 창업에 아무런 쓸모도 없는 배움에 시간을 허비한다"는 부정적인 시선을 보내기도 했습니다. 잡스 본인조차도 이 지식이 미래에 어떤 가치를 발현할지 전혀 예상하지 못한 채, 그저 지적 호기심의 점을 하나씩 찍어두었을 뿐이었습니다.</p>
                    <p>하지만 정확히 10년 뒤, 세상의 흐름을 바꾸는 놀라운 반전이 시작됩니다. 잡스가 세계 최초로 개인용 그래픽 운영체제를 갖춘 컴퓨터인 '매킨토시'를 설계하기 시작했을 때입니다. <strong>방황하던 청년 시절에 무심코 남겨두었던 그 정밀한 서체 지식들이 잡스의 머릿속에서 선명하게 연결된 것입니다.</strong> 그는 기계적이고 삭막했던 기존 컴퓨터 화면을 완전히 탈피하여, 아름답고 직관적인 글꼴 크기와 간격을 컴퓨터 시스템의 기본 규격으로 정립했습니다. 만약 그 시절에 무의미해 보이던 배움의 점을 찍어두지 않았더라면, 우리가 매일 들여다보는 미려한 디지털 업무 화면은 탄생하지 못했을 것입니다.</p>
                    <p><strong>우리가 오늘 마주하는 일상적인 지식의 축적 과정 역시 이와 완전히 결을 같이합니다.</strong><br/>매일 아침 검토하는 복잡한 보상 판례, 까다로운 세법 해석, 고액 자산가의 포트폴리오를 다루는 세부 기법 등은 지금 당장은 눈앞의 가시적인 결과와 연결되지 않는 것처럼 보일 수 있습니다. '이 까다로운 세부 조항까지 굳이 파헤쳐야 하는가' 하는 의구심이 들 때도 있을 것입니다.</p>
                    <p>그러나 우리 같은 프로들의 세계에서는 결코 헛되이 흩어지는 배움이란 존재하지 않습니다. 오늘 마음속에 깊이 새겨둔 예리한 분석력과 약관의 조항 한 줄은, 훗날 일생일대의 중요한 의사결정을 내려야 하는 핵심 미팅이나 기업 대표와의 심도 있는 재무 상담 현장에서 남들은 결코 흉내 낼 수 없는 **독보적인 전문성의 빛**으로 발현될 것입니다. 우리가 찍어가고 있는 수많은 지식의 점들이 마침내 하나의 큰 성공의 선으로 완성되는 그날을 향해, 오늘 하루도 깊이와 기품을 더하는 시간으로 채워가시기를 바랍니다.</p>

                summary: "일상생활배상책임 특약이 다각도로 중복 가입되어 있는 경우, 대물 사고나 누수 피해 시 약관상 기재되어 있는 가입자 자부담금 20만 원이 비례분담 원리에 의해 완전히 소멸하는 구조를 분석합니다. 실무 현장에서 간과하기 쉬운 가입자의 합법적 권리를 논리적으로 도출해내는 리더 가이드를 제시합니다.",
                sourceUrl: "https://glaw.scourt.go.kr/wsjo/panre/sjo100.do?q=%EB%8C%80%EB%B2%95%EC%9B%90%202002%EB%8B%A461168",
                fullContent: `
                    <h3>⚖️ 일배책 중복 가입 시 자기부담금 상쇄 메커니즘과 교육적 정밀 분석</h3>
                    <p>보상 실무에서 가장 빈번하게 논의되면서도, 여전히 세부 원리를 정확히 정립하지 못해 놓치기 쉬운 <strong>'가족일상생활배상책임(이하 일배책) 특약의 중복 가입 시 본인부담금 상쇄 법리'</strong>를 대법원 2002다61168 판결을 근거로 분석합니다.</p>
                    
                    <div class="instructor-guide">
                        <p className="text-base font-black text-orange-800 m-0 mb-2">🎓 [지점 리더 가이드] 현장 교육 시 반드시 정립해야 할 강의 핵심</p>
                        <p className="text-sm text-orange-700 leading-relaxed m-0">
                            본 교육의 목표는 일배책의 단순한 유용성을 넘어, **"우리 같은 프로들이 고객의 숨겨진 권리를 찾아주는 전문 동반자가 되어야 한다"**는 본질을 심어주는 데 있습니다. 보상 실무 과정에서 기계적인 정산 처리로 인해 계약자 자부담 20만 원이 불합리하게 공제되는 사례가 빈번합니다. 이 정밀한 법적 원리를 명확하게 전수하여 현장의 전문성 수준을 차별화해 주십시오.
                        </p>
                    </div>

                    <h4>1. 보상 원리를 이해하기 위한 핵심 개념의 명확한 정의</h4>
                    <p>약관과 사법부 판례를 정독할 때 마주하는 낯선 어휘들을 먼저 논리적으로 정의하여 강의의 명확성을 높입니다.</p>
                    <ul>
                        <li><strong>독립책임액 분담원칙</strong>: 예컨대 타인의 자산에 누수 사고로 100만 원의 손해배상 책임이 발생했을 때, 복수의 보험사가 타 계약의 존재 여부와 무관하게 산출해 낸 각각의 지급 한도(독립책임액) 비율에 의거하여 분담 지급하는 상법상의 공평한 손해 분담 규칙입니다.</li>
                        <li><strong>자기부담금(면책금)</strong>: 과도한 소액 보상 청구를 방지하고 도덕적 해이를 막기 위해, 대물 사고 발생 시 계약자가 일정 수준(통상 20만 원)을 분담하도록 규정해 놓은 약정 금액입니다.</li>
                    </ul>

                    <h4>2. 대법원이 판시한 권리 방어의 법리적 배경</h4>
                    <p>실제 소송 사건에서 다수의 보험사는 개별 계약의 약관에 규정된 '본인부담금 공제' 조항을 개별적으로 적용하여 각각 20만 원씩을 제한 후 보험금을 지급하겠다는 논리를 고수했습니다. 그러나 대법원은 사법부의 엄격한 상법 해석 기준에 따라 이를 전면 반박했습니다.</p>
                    <p>판결 요지는 다음과 같습니다. 동일한 사고에 대해 여러 개의 배상책임 특약이 구동되는 '중복보험' 구도에 진입하고 각 사의 독립책임액 합산액이 실제 발생한 손해액보다 크게 구성되는 경우, 세부 산정식에 근거한 상법상의 비례 분배 처리가 우선됩니다. 이에 따라 <strong>계약자가 부담해야 할 자부담 한도는 보험사들이 책임을 나누어 가지는 계산 과정에서 상호 상쇄되어 소멸하는 구조</strong>를 취하게 됩니다. 결과적으로 가입자는 법리적으로 추가 부담금 없이 실제 피해액에 대한 100% 정상 전액 보상을 실현할 수 있게 됩니다.</p>

                    <h4>3. 비즈니스 미팅에서 즉시 발휘되는 논리적 터치 스크립트</h4>
                    <p>미팅 현장에서 우리 같은 프로들이 가망 고객의 포트폴리오를 점검하며 신뢰도를 제고할 수 있는 정교한 대화 예시입니다.</p>
                    <p><strong>[전문 상담 스크립트]</strong>: "고객님, 일상에서 일어날 수 있는 아랫집 누수 손해나 예기치 못한 타인의 재물 파손 사고가 발생하면 참으로 막막하기 마련입니다. 보통 보장 처리가 되더라도 수십만 원의 약정 자부담금이 불필요한 현금 지출로 이어지게 되지요. 하지만 가족분들이 지니고 계신 다각도의 보장 포트폴리오를 정밀하게 진단하여, 최소한의 비용으로 설계된 일배책 특약을 정교하게 분산 배치해 두면 이야기가 달라집니다. 큰 사고가 터졌을 때 대법원의 확고한 중복보험 판례에 의거하여, <strong>그 본인부담금 20만 원이 법적으로 완벽하게 면제되어 0원</strong>으로 처리됩니다. 이러한 보이지 않는 권리와 법적 이익까지 완벽하게 관리해 드리는 것, 그것이 바로 세련된 인생 안전망을 설계하는 저의 역할입니다."</p>
                `
            }
        ];

        const SEED_INDUSTRY = [
            {
                category: "FSS",
                title: "4세대 실손보험 비급여 차등제 전격 시행의 본질과 가계 고정비 리밸런싱 해법",
                summary: "무분별한 비급여 청구 가입자에게 최대 300%까지 할증을 매기는 4세대 실손 차등제 지침의 근본적인 원인을 조명합니다. 갱신 폭탄의 두려움을 안심으로 바꾸고, 옛날 실손의 무거운 거품을 걷어내어 보험료를 반값 이하로 떨어뜨리는 동시에 우리만의 비갱신형 코어 담보를 단단하게 보완하는 우리 같은 프로들을 위한 역발상 상담 전략입니다.",
                fullContent: `
                    <h3>📊 4세대 실손 비급여 차등제의 진짜 배경과 똑똑한 보험료 다이어트 비법</h3>
                    <p>리더 여러분, 최근 금융감독원에서 연일 강조하고 있는 <strong>'4세대 실손의료보험 비급여 차등제 및 할증 제도'</strong> 때문에 고객분들이 불안해하시는 목소리를 많이 들으실 겁니다. "이제 무서워서 실손 청구도 마음대로 못 하겠다", "보험료 엄청 오르는 것 아니냐"며 걱정하시는 지금이, 우리에게는 가만히 앉아서 대형 계약을 만들어낼 수 있는 최고의 기회입니다. 이 제도가 왜 나왔고, 어떻게 활용해야 하는지 샅샅이 파헤쳐 보겠습니다.</p>
                    
                    <h4>1. 이 정책이 왜 나왔는지, 숨겨진 배경부터 이해하셔야 합니다</h4>
                    <p>우리가 과거에 많이 판매했던 1세대, 2세대 옛날 실손보험는 혜택은 정말 좋았습니다. 하지만 치명적인 문제가 있었습니다. 병원에 거의 가지 않는 대다수의 선량한 가입자들은 가만히 있는데, 일부 극소수의 가입자들이 일부 부도덕한 병원과 짜고 영양제 주사나 비싼 비급여 도수치료를 1년에 수백 번씩 받으며 보험금을 타갔던 겁니다. 이 때문에 보험회사의 손해율이 하늘을 찌를 듯이 치솟았고, 그 적자를 메우기 위해 병원에 한 번도 안 간 선량한 우량 가입자들까지 똑같이 묶여서 매년 엄청난 '갱신 보험료 폭탄'을 맞아야 했습니다. 내가 쓰지도 않은 병원비를 남 대신 내주고 있었던 셈이죠.</p>
                    <p>정부가 이 억울한 구조를 더 이상 두고 볼 수 없어서 만든 제도가 바로 4세대 실손입니다. 핵심은 아주 심플합니다. <strong>"자동차 보험처럼, 병원비 많이 쓴 사람은 보험료를 더 내고, 안 쓴 사람은 깎아주겠다"</strong>는 원칙입니다.</p>
                    <ul>
                        <li><strong>직전 1년간 비급여 청구를 안 한 고객</strong>: 전체 가입자의 대부분을 차지하는 이 우량 고객분들은 다음 해 비급여 보험료의 10% 수준을 즉시 할인받습니다. 아주 합리적이죠.</li>
                        <li><strong>연간 비급여 보험금을 300만 원 넘게 타간 가입자</strong>: 무분별하게 비급여를 남용한 분들에게는 원래 내던 비급여 보험료의 최대 300%, 즉 3배까지 할증을 매기는 강력한 페널티를 줍니다.</li>
                    </ul>

                    <h4>2. 위기를 대형 계약으로 바꾸는 역발상 세일즈 가이드</h4>
                    <p>고객들이 할증 제도를 무서워하며 몸을 사릴 때, 우리는 불안감을 안심으로 바꿔주는 구원투수가 되어야 합니다. 매달 20만 원, 30만 원씩 기하급수적으로 오르는 옛날 실손보험을 붙잡고 끙끙 앓는 고객들을 찾아가십시오. 그리고 4세대 실손으로 가볍게 전환시켜서 매월 세어나가는 고정 비용을 즉각 반값 이하로 뚝 떨어뜨려 드리는 겁니다.</p>
                    <p>그렇게 해서 아낀 소중한 가계 주머니 속 여유 자금을 가지고, <strong>아무리 병원에 자주 가고 청구를 많이 해도 보험료가 단 1원도 오르지 않고 영구 고정되는 '당사만의 비갱신형 코어 담보(종합 수술비, 3대 진단비)'를 단단하게 보완</strong>해 주는 리밸런싱이 바로 핵심 정답입니다.</p>
                    <p><strong>[가망 고객 소구 스크립트]</strong>: "고객님, 밥상 물가도 오르는데 매달 몇십만 원씩 무섭게 오르는 옛날 실손보험을 그대로 쥐고 계시는 게 가계 경제에서 가장 위험한 구멍입니다. 이제는 영리하게 바꾸셔야 합니다. 실손보험은 쓴 만큼만 내는 가볍고 저렴한 4세대로 바꾸셔서 매달 나가는 고정 지출을 즉각 10만 원 넘게 아끼세요. 그리고 그렇게 아끼신 귀한 돈으로, 내가 앞으로 큰 병에 걸려 병원에 백 번을 가든 천 번을 청구하든 <strong>평생 보험료 인상이 영구적으로 동결되는 든든한 비갱신형 수술비와 진단비 울타리</strong>를 새로 채워두시는 겁니다. 청구할 때마다 보험료 오를까 봐 전전긍긍하는 불안한 실손의 약점을 완벽하게 메우고, 아무리 청구해도 내 자산으로 고정되는 진짜 똑똑한 재테크를 지금 이 시점에 저와 함께 시작해 보시죠."</p>
                `
            }
        ];

        const DAILY_DATA_BANK = {};
        for (let day = 1; day <= 31; day++) {
            const motivation = SEED_MOTIVATIONS[0];
            const claimsReport = SEED_NEWS[0];
            const industryReport = SEED_INDUSTRY[0];

            DAILY_DATA_BANK[day] = {
                motivation: {
                    ...motivation,
                    text: `[제${day}일의 부스트] ${motivation.text}`
                },
                claimsReport: {
                    ...claimsReport,
                    rawTitle: `⚖️ [제${day}강] ${claimsReport.rawTitle}`
                },
                industryReport: {
                    ...industryReport,
                    title: `📢 [제${day}신] ${industryReport.title}`
                }
            };
        }

        function App() {
            const [selectedNews, setSelectedNews] = useState(null);
            const [todayKST, setTodayKST] = useState("");
            const [isCopying, setIsCopying] = useState(false);
            const [simulatedDay, setSimulatedDay] = useState("");

            const getKSTDateMetrics = useCallback(() => {
                const now = new Date();
                const formatter = new Intl.DateTimeFormat('ko-KR', {
                    timeZone: 'Asia/Seoul', year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric', hour12: false
                });
                const parts = formatter.formatToParts(now);
                const partValues = {};
                parts.forEach(part => { partValues[part.type] = part.value; });
                
                const year = parseInt(partValues.year, 10);
                const month = parseInt(partValues.month, 10);
                const day = parseInt(partValues.day, 10);
                const hour = parseInt(partValues.hour, 10);
                const minute = parseInt(partValues.minute, 10);
                
                let kstMoment = new Date(Date.UTC(year, month - 1, day, hour, minute));
                if (hour < 8 || (hour === 8 && minute < 30)) {
                    kstMoment.setUTCDate(kstMoment.getUTCDate() - 1);
                }
                return {
                    year: kstMoment.getUTCFullYear(),
                    month: String(kstMoment.getUTCMonth() + 1).padStart(2, '0'),
                    day: String(kstMoment.getUTCDate()).padStart(2, '0'),
                    dayValue: kstMoment.getUTCDate()
                };
            }, []);

            useEffect(() => {
                const metrics = getKSTDateMetrics();
                setTodayKST(`${metrics.year}. ${metrics.month}. ${metrics.day}`);
                const timeTracker = setInterval(() => {
                    const nextMetrics = getKSTDateMetrics();
                    setTodayKST(`${nextMetrics.year}. ${nextMetrics.month}. ${nextMetrics.day}`);
                }, 60000);
                return () => clearInterval(timeTracker);
            }, [getKSTDateMetrics]);

            const activeData = useMemo(() => {
                if (simulatedDay) {
                    return DAILY_DATA_BANK[parseInt(simulatedDay, 10)] || DAILY_DATA_BANK[1];
                }
                const metrics = getKSTDateMetrics();
                return DAILY_DATA_BANK[metrics.dayValue] || DAILY_DATA_BANK[1];
            }, [getKSTDateMetrics, todayKST, simulatedDay]);

            useEffect(() => {
                document.body.style.overflow = selectedNews ? 'hidden' : 'unset';
                return () => { document.body.style.overflow = 'unset'; };
            }, [selectedNews]);

            const handleCopyText = (htmlContent) => {
                const cleanText = htmlContent.replace(/<[^>]*>/g, '').trim();
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(cleanText)
                        .then(() => { setIsCopying(true); setTimeout(() => setIsCopying(false), 2000); })
                        .catch(() => fallbackCopyText(cleanText));
                } else {
                    fallbackCopyText(cleanText);
                }
            };

            const fallbackCopyText = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed"; textArea.style.left = "-999999px";
                document.body.appendChild(textArea); textArea.focus(); window.scrollTo(0,0); textArea.select();
                try { document.execCommand('copy'); setIsCopying(true); setTimeout(() => setIsCopying(false), 2000); } catch (err) {}
                document.body.removeChild(textArea);
            };

            const CategoryTag = ({ type }) => {
                const configs = {
                    HANWHA: { label: "한화 독점 소식", color: "bg-orange-500", icon: "sun" },
                    FSS: { label: "금감원 정책 가이드", color: "bg-blue-600", icon: "shield-check" },
                    CLAIMS: { label: "손해사정 판례특보", color: "bg-red-600", icon: "scale" },
                    ECONOMY: { label: "생활 경제 인사이트", color: "bg-emerald-600", icon: "trending-up" },
                    MOTIVATION: { label: "모닝 비즈니스 에세이", color: "bg-rose-500", icon: "flame" },
                };
                const config = configs[type] || configs.HANWHA;
                return (
                    <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[9px] font-black text-white uppercase tracking-wider ${config.color}`}>
                        <CustomIcon name={config.icon} size={10} /> {config.label}
                    </span>
                );
            };

            return (
                <div className="min-h-screen pb-12 bg-[#F9F9FB]">
                    <nav className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm">
                        <div className="max-w-2xl mx-auto px-4 h-16 flex items-center justify-between gap-2">
                            <div className="flex items-center gap-1.5">
                                <div className="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center shadow-md shadow-orange-200">
                                    <CustomIcon name="sun" className="text-white" size={16} />
                                </div>
                                <span className="font-black text-lg tracking-tighter uppercase text-gray-900">Leaders <span className="text-orange-500 font-medium">Insight</span></span>
                            </div>
                            <div className="flex items-center gap-1.5 max-w-[50%]">
                                <select value={simulatedDay} onChange={(e) => setSimulatedDay(e.target.value)} className="w-full appearance-none bg-gray-50 border border-gray-200 rounded-lg px-4 py-1.5 text-[11px] font-bold text-gray-700 focus:outline-none cursor-pointer truncate">
                                    <option value="">📅 실시간 자동 교대</option>
                                    {Array.from({ length: 31 }, (_, i) => i + 1).map(day => (
                                        <option key={day} value={day}>📅 {day}일자 콘텐츠 정밀 검증</option>
                                    ))}
                                </select>
                            </div>
                        </div>
                    </nav>

                    {}
                    <main className="max-w-2xl mx-auto px-4 py-8 space-y-10 animate-slide-up">
                        <header className="space-y-2">
                            <div className="flex items-center gap-1.5">
                                <div className="p-1 bg-orange-100 rounded text-orange-600"><CustomIcon name="flame" size={12} /></div>
                                <span className="text-[10px] font-black text-orange-600 uppercase tracking-widest">Premium Boost Portal</span>
                            </div>
                            <h2 className="text-2xl md:text-3xl font-black leading-tight tracking-tight text-gray-900">영업 명장을 위한<br/><span className="text-orange-500">오늘의 심층 리포트</span></h2>
                            <p className="text-gray-400 font-semibold text-[11px] leading-relaxed">
                                {simulatedDay ? <span className="text-orange-600 font-extrabold bg-orange-50 px-2 py-1 rounded border border-orange-100">데이터 시뮬레이션 작동 중</span> : "리더분들의 전문적인 소양 축적과 학술 연구를 위한 사법부 판례 해설 및 규정집이 매일 오전 업데이트됩니다."}
                            </p>
                        </header>

                        <section className="group relative h-[420px] rounded-[2rem] overflow-hidden shadow-xl shadow-gray-200 bg-black cursor-pointer"
                                 onClick={() => setSelectedNews({ ...activeData.motivation, category: 'MOTIVATION', title: activeData.motivation.text })}>
                            <img src={activeData.motivation.image} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 opacity-85" alt="" />
                            <div className="absolute inset-0 bg-gradient-to-t from-gray-950 via-gray-950/50 to-transparent" />
                            <div className="absolute bottom-0 left-0 p-6 w-full space-y-3">
                                <CategoryTag type="MOTIVATION" />
                                <h3 className="text-lg md:text-2xl font-black text-white leading-snug break-keep">{activeData.motivation.text}</h3>
                                <p className="text-white/80 text-xs leading-relaxed break-keep line-clamp-4">{activeData.motivation.subText}</p>
                                <div className="pt-2 flex items-center gap-1 text-[10px] font-black text-orange-400 uppercase tracking-widest">분석 에세이 원문 읽기 <CustomIcon name="external-link" size={10} /></div>
                            </div>
                        </section>

                        {}
                        <section className="space-y-4">
                            <div className="flex items-center gap-1.5 text-gray-900 pb-1">
                                <div className="p-1.5 bg-gray-100 rounded-lg"><CustomIcon name="book-open" size={16} /></div>
                                <h3 className="font-black text-lg tracking-tight text-gray-900">오늘의 종합 교육 매뉴얼</h3>
                            </div>
                            
                            <div className="grid grid-cols-1 gap-4">
                                <div onClick={() => setSelectedNews(activeData.claimsReport)} className="group flex items-start gap-4 p-6 bg-white rounded-2xl border border-gray-100 hover:border-red-200 hover:shadow-xl transition-all cursor-pointer">
                                    <div className="shrink-0 w-11 h-11 rounded-xl flex items-center justify-center bg-red-50 text-red-600 group-hover:bg-red-500 group-hover:text-white transition-all"><CustomIcon name="scale" size={20} /></div>
                                    <div className="flex-1 space-y-2 min-w-0">
                                        <CategoryTag type="CLAIMS" />
                                        <h4 className="text-base font-black text-gray-900 group-hover:text-red-700 transition-colors break-keep leading-snug">{activeData.claimsReport.rawTitle}</h4>
                                        <p className="text-xs text-gray-500 leading-relaxed line-clamp-4">{activeData.claimsReport.summary}</p>
                                        <div className="pt-1 flex items-center gap-0.5 text-[10px] font-black text-red-600">학술적 판례 해설 및 스크립트 보기 <CustomIcon name="external-link" size={9} /></div>
                                    </div>
                                </div>

                                <div onClick={() => setSelectedNews(activeData.industryReport)} className="group flex items-start gap-4 p-6 bg-white rounded-2xl border border-gray-100 hover:border-orange-200 hover:shadow-xl transition-all cursor-pointer">
                                    <div className="shrink-0 w-11 h-11 rounded-xl flex items-center justify-center bg-orange-50 text-orange-500 group-hover:bg-orange-500 group-hover:text-white transition-all"><CustomIcon name={activeData.industryReport.category === 'FSS' ? 'shield-check' : 'sun'} size={20} /></div>
                                    <div className="flex-1 space-y-2 min-w-0">
                                        <CategoryTag type={activeData.industryReport.category} />
                                        <h4 className="text-base font-black text-gray-900 group-hover:text-orange-600 transition-colors break-keep leading-snug">{activeData.industryReport.title}</h4>
                                        <p className="text-xs text-gray-500 leading-relaxed line-clamp-4">{activeData.industryReport.summary}</p>
                                        <div className="pt-1 flex items-center gap-0.5 text-[10px] font-black text-orange-500">시장 전망 및 포트폴리오 가이드 보기 <CustomIcon name="external-link" size={9} /></div>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>

                    {}
                    {selectedNews && (
                        <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center p-0 md:p-4">
                            <div className="absolute inset-0 bg-gray-950/70 backdrop-blur-sm" onClick={() => setSelectedNews(null)} />
                            <div className="relative bg-white w-full max-w-2xl h-[88vh] md:h-auto md:max-h-[85vh] overflow-hidden rounded-t-3xl md:rounded-3xl shadow-2xl flex flex-col z-10 animate-slide-up">
                                <div className="sticky top-0 bg-white/95 backdrop-blur-md border-b border-gray-100 px-5 py-4 flex items-center justify-between z-20">
                                    <div className="flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-orange-500 animate-pulse" />
                                        <span className="text-[10px] font-black text-gray-400 uppercase tracking-wider">{selectedNews.category} Educational Document</span>
                                    </div>
                                    <button onClick={() => setSelectedNews(null)} className="p-1.5 hover:bg-gray-100 rounded-xl text-gray-400"><CustomIcon name="x" size={20} /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 md:p-10 custom-scrollbar">
                                    <div className="space-y-6">
                                        <h2 className="text-xl md:text-2xl font-black text-gray-900 leading-snug break-keep">{selectedNews.title || selectedNews.rawTitle}</h2>
                                        <div className="article-body" dangerouslySetInnerHTML={{ __html: selectedNews.fullContent }} />
                                        
                                        {selectedNews.sourceUrl && (
                                            <div className="p-4 bg-slate-50 border border-slate-100 rounded-xl flex flex-col gap-3">
                                                <div className="flex items-center gap-2">
                                                    <div className="p-2 bg-white rounded-lg text-gray-400 shadow-sm"><CustomIcon name="file-text" size={16} /></div>
                                                    <div>
                                                        <p className="text-xs font-black text-gray-900">대한민국 법원 종합법률정보 판례 고증</p>
                                                        <p className="text-[10px] text-gray-400">대법원 선고 원본 데이터 연동</p>
                                                    </div>
                                                </div>
                                                <a href={selectedNews.sourceUrl} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-1.5 w-full py-2.5 bg-gray-900 text-white rounded-lg text-xs font-black hover:bg-black transition-all">공식 판결문 원본 확인하기 <CustomIcon name="external-link" size={11} /></a>
                                            </div>
                                        )}
                                        
                                        <div className="p-4 bg-orange-50/50 border-l-4 border-orange-500 text-[11px] text-gray-500 font-medium leading-relaxed rounded-r-xl">
                                             💡 본 교육자료는 리더분들의 전문 역량 강화와 신뢰도 높은 리서치 지원을 목적으로 기획되었습니다. 비즈니스 미팅 세미나 및 고객 세션 자료로 인용하여 활용하시기 바랍니다.
                                        </div>

                                        <div className="pt-6 border-t border-gray-100 space-y-3">
                                             <button onClick={() => handleCopyText(selectedNews.fullContent)} className="w-full flex items-center justify-center gap-2 py-4 bg-orange-500 text-white font-black rounded-xl hover:bg-orange-600 transition-all shadow-md text-sm">
                                                 <CustomIcon name={isCopying ? "check" : "copy"} size={14} />
                                                 {isCopying ? "텍스트가 클립보드에 복사되었습니다!" : "본문 내용 전체 복사하기 (미팅 제안 / 텍스트 배포용)"}
                                             </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
