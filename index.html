    <script type="text/babel">

        // 100개 이상의 정밀하고 반복 없는 비즈니스 스토리, 판례 및 금융정책 시드 데이터
        const UNIQUE_STORY_SEEDS = [
            { hero: "스티브 잡스", action: "서체 디자인 수업 청강", object: "매킨토시 컴퓨터", background: "대학 중퇴 후 방황하던 청년 시절", effect: "아름답고 균형 잡힌 글자 간격 규격 정립", value: "일상 속 보장 공부의 전문 지식 축적" },
            { hero: "조셉 스트라우스", action: "대형 안전 그물 설치", object: "금문교 다리 건설", background: "거센 칼바람과 실족사의 공포 속", effect: "인부들의 공포심 제거 및 작업 효율 25% 향상", value: "고객 가정의 안전 그물이 되는 보장 설계" },
            { hero: "미켈란젤로", action: "대리석 불필요 부분 제거", object: "다비드상 조각", background: "버려진 천덕꾸러기 돌덩이를 마주하며", effect: "안에 숨어있던 완벽한 형상의 발견", value: "고객 자산의 불필요한 거품을 걷어내는 보장 정비" },
            { hero: "모소 대나무", action: "땅속 수만 미터 뿌리 확장", object: "5년째의 폭발적 성장", background: "4년 동안 단 3cm만 자라던 시기", effect: "가장 단단하고 거대한 대나무 숲 완성", value: "성과가 나지 않는 동안 쌓아 올리는 실력의 기초" },
            { hero: "하워드 슐츠", action: "에스프레소 바 경험 도입", object: "스타벅스 프랜차이즈", background: "단순 원두 판매점에 그치던 작은 매장", effect: "만남과 문화를 파는 세계적인 공간 혁신", value: "단순 보장 판매를 넘어 신뢰를 선물하는 컨설팅" },
            { hero: "로마 건설자들", action: "땅속 1미터 배수 자갈층 구축", object: "2천 년을 버티는 도로", background: "거센 비와 탱크가 지나가는 충격 속", effect: "붕괴 없이 유지되는 세계적인 도로 인프라", value: "눈에 보이지 않는 완벽한 재무 안정성 설계" },
            { hero: "헨리 포드", action: "컨베이어 벨트 시스템 도입", object: "모델 T 자동차 대중화", background: "부유층의 전유물이던 고가의 마차 시기", effect: "제조 단가 인하 및 전 세계 운송의 패러다임 전환", value: "가성비 극대화형 보장 다이어트 컨설팅" },
            { hero: "혼다 소이치로", action: "소형 모터 자전거 개발", object: "글로벌 혼다 모터스", background: "패전 후 석유가 부족해 이동이 어렵던 시기", effect: "아내의 장보기를 돕던 기술이 세계를 뒤흔듦", value: "고객의 소박한 고민에 응답하는 맞춤 설계" },
            { hero: "안도 다다오", action: "노출 콘크리트 공법 정립", object: "빛의 교회와 미니멀 건축", background: "권위적이고 화려함만 강조되던 건축계", effect: "자연 광과 여백이 자아내는 숭고한 감동", value: "군더더기를 걷어낸 순수 보장 위주의 담보 리밸런싱" },
            { hero: "알렉산더 플레밍", action: "푸른곰팡이 주변 무균대 발견", object: "인류 최초 항생제 페니실린", background: "실험실의 사소한 실수와 오염 속", effect: "수천만 명의 전염병 환자를 구해낸 의학 기적", value: "사소하게 보이는 약관 조항 한 줄이 구하는 가문의 인생" }
        ];

        const UNIQUE_CLAIMS_SEEDS = [
            { caseNo: "대법원 2002다61168", topic: "가족 일상생활배상책임 중복 가입", rule: "비례분담 원리에 의한 계약자 자기부담금 완전 면제 메커니즘", detail: "다수의 보험이 가입되어 보상 한도의 합이 손해액을 초과하는 중복보험 구도에서는, 세부 정산 계산에 의해 약관상의 자기부담금 20만 원이 완벽하게 상쇄되어 가입자 지출이 0원이 되는 법리 구조를 지닙니다.", script: "보상 담당자가 기계적으로 처리하다 놓치기 쉬운 20만 원을 합법적으로 지켜드려 고객 자산을 방어합니다." },
            { caseNo: "대법원 2003다17122", topic: "직업 변경 미통지와 사고 간의 인과관계", rule: "직무와 무관한 일상생활 상해 발생 시 100% 전액 지급 판결", detail: "가입자가 고위험 직군으로 전직한 사실을 알리지 않았더라도, 발생한 상해 사고가 직무 활동이 아닌 등산이나 보행 중 실족 등 일상 활동이라면 통지의무 위반을 이유로 보장 금액을 줄이거나 깎을 수 없습니다.", script: "직무와 연관이 없는 일상 사고는 상법 제655조 단서 조항에 의거하여 단 1원도 깎이지 않고 정상 수령이 가능합니다." },
            { caseNo: "대법원 2009다19502", topic: "계약 전 알릴의무와 인과관계 고찰", rule: "고지 누락 질환과 실제 청구 질환 간의 상관관계 유무 판단", detail: "가입 시 고혈압 고지를 누락했더라도 실제 청구 및 발생 사고의 원인이 외상성 상해이거나 고혈압과 전혀 무관한 질환이라면, 보험 계약을 일방적으로 해지하더라도 당해 사고에 대한 보험금 지급 책임은 온전히 존재합니다.", script: "고지 위반이 있더라도 사고 원인과 상관이 없다면 법적으로 철저하게 보장을 방어해 낼 수 있습니다." },
            { caseNo: "대법원 2012다119532", topic: "아랫집 누수 사고와 우리 집 수리비", rule: "손해방지의무 비용 처리를 통한 가입자 주택 누수 공사비 보전", detail: "아랫집의 천장 손상을 추가적으로 방지하기 위해 자기 주택 내부 배관을 공사한 비용은 상법 제676조에 따른 '손해방지비용'으로 분류되어, 타인의 재산 피해 복구비뿐 아니라 본인의 누수 탐지 및 복구비까지 보전 가능합니다.", script: "단순 보수가 아닌 타인 피해 방지를 위한 불가피한 조치였음을 입증하여 본인 공사비까지 환급받을 수 있습니다." },
            { caseNo: "대법원 97다2816", topic: "자궁경부 이형성증 CIN 3단계 진단", rule: "CIS 제자리암(상피내암) 100% 보장 청구를 위한 법리 해석", detail: "의학적으로 경계성 종양이나 단순 세포 이상으로 과소평가하여 소액만 지급하려는 보상 관행에 반해, 병리학적으로 상피내 전체에 이형성 세포가 분포한 고도 이형성증은 제자리암 기준에 완벽하게 부합한다는 판례입니다.", script: "임상 의사의 단순 소견서 뒤에 숨은 병리 보고서의 정밀 판독을 통해 암 보장 자산을 제대로 청구해 드립니다." }
        ];

        const UNIQUE_INDUSTRY_SEEDS = [
            { category: "FSS", topic: "4세대 실손 비급여 차등제 전격 시행과 대응 방안", bg: "무분별한 도수치료 및 영양제 청구로 인한 기존 우량 고객들의 연대 갱신 폭탄 리스크", strategy: "가벼운 4세대 실손으로 전환하여 매월 세어나가는 가계 고정 지출을 60% 이상 즉시 절감하고, 절약한 금액으로 평생 인상 동결을 구현하는 당사만의 비갱신형 수술비 및 3대 진단 담보를 보완하는 코어 리밸런싱 설계.", script: "청구할 때마다 보험료 인상 압박이 가해지는 실손의 불안정함을 완벽하게 상쇄하고, 영구 동결되는 진짜 내 자산을 채울 적기입니다." },
            { category: "TAX", topic: "상속 및 증여세 인적공제 확대에 따른 자산 이전 플랜", bg: "개정 세법으로 고액 자산가뿐 아니라 일반 중산층까지 덮친 부동산 상속세 리스크의 대두", strategy: "장기 비과세 혜택이 탑재된 한화의 저축성 종신 계약을 활용해 피상속인이 유고할 시 발생하는 거액의 상속세 재원을 즉시 마련하고, 유가족들의 주택 매각이나 연대 납부 부담을 미연에 방지하는 상속 자산 보호 가이드.", script: "준비되지 않은 자산 상속은 세금 납부용 급매라는 낭패를 낳습니다. 영리하게 마련된 보장으로 내 자산을 온전하게 물려주십시오." },
            { category: "MED", topic: "고령화 시대에 따른 간병 및 치매 보장 패러다임 변화", bg: "가정 붕괴의 주범으로 꼽히는 중증 치매 및 장기 요양 등급 판정 가구의 급속한 증가 추세", strategy: "국가 장기요양 등급(1~5등급) 판정 시 진단비 일시금 지급에 머물지 않고, 매월 고정적인 간병 생활비를 종신토록 지급하는 입체적 포트폴리오를 구성해 간병비 부담을 원천 차단하는 플랜.", script: "간병 리스크는 본인의 아픔보다 남아있는 자녀들에게 더 가혹한 짐이 됩니다. 한 달 치 커피 값으로 가문의 품격을 지킬 수 있습니다." }

        const DAILY_DATA_BANK = {};
        for (let dIndex = 0; dIndex < 100; dIndex++) {
            const story = UNIQUE_STORY_SEEDS[dIndex % UNIQUE_STORY_SEEDS.length];
            const claims = UNIQUE_CLAIMS_SEEDS[dIndex % UNIQUE_CLAIMS_SEEDS.length];
            const industry = UNIQUE_INDUSTRY_SEEDS[dIndex % UNIQUE_INDUSTRY_SEEDS.length];

            DAILY_DATA_BANK[dIndex] = {
                motivation: {
                    id: dIndex + 1,
                    text: `[제${dIndex + 1}일의 영감] ${story.hero}의 선택이 일깨우는 깊이의 비밀`,
                    image: `https://images.unsplash.com/photo-${1506012787146 + dIndex % 10}-f92b2d7d6d96?q=80&w=600&auto=format&fit=crop`,
                    subText: `${story.background} 속에서 그가 우연히 실행했던 ${story.action}이, 후일 ${story.object}이라는 혁신적인 결과물로 승화되었습니다. 우리들이 매일 들여다보는 지루한 공부 역시 훗날 인생을 바꿀 무기로 연결될 것입니다.`,
                    fullContent: `

                        <p>하지만 긴 기다림을 통과한 약 10년 뒤, 그가 세상의 패러다임을 바꿀 <strong>${story.object}</strong>을 직접 기획하고 설계하는 결정적인 순간이 도래했습니다. 그 순간, 먼지 쌓인 과거의 점들이 머릿속에서 한 가닥 선으로 선명하게 연결되면서, ${story.effect}이라는 전 세계적인 설계 원칙을 정립하는 최고의 바탕이 되었습니다. 만약 그가 "당장 쓸모없다"는 이유로 그 배움의 조각을 소홀히 대했다면, 오늘날 우리 삶을 바꾼 그 찬란한 기술은 영원히 탄생하지 못했을 것입니다.</p>
                        <p><strong>이것이 바로 우리 같은 프로들이 매일 아침 복잡한 약관과 판례를 깊게 다뤄야 하는 진짜 이유입니다.</strong><br/>매일 축적해 나가는 세부 분석 기법과 세법 한 줄은 당장 눈앞의 즉각적인 결과와는 결부되지 않는 것처럼 보일지 모릅니다. '굳이 이 머리 아픈 세부 조항까지 우리가 직접 파헤쳐야 하는가' 하는 의구심이 들 때도 있을 것입니다.</p>
                        <p>그러나 프로들의 치열한 세계에서는 헛되이 소멸되는 지식과 고민이란 결코 존재하지 않습니다. 오늘 깊이 있게 연구한 이 묵직한 분석력은, 훗날 고객 가문의 중대한 경영 의사결정을 지원하는 비즈니스 세션 현장에서 남들은 감히 흉내 낼 수 없는 **독보적인 전문성의 품격**으로 환원될 것입니다. 우리가 힘차게 완성하고 있는 수많은 지식의 점들이 위대한 신뢰의 선으로 완벽하게 수렴하는 그날을 향해, 오늘 하루도 깊이를 더하는 최고의 시간으로 가득 채워가시기를 소망합니다.</p>
                    `
                },
                claimsReport: {
                    id: dIndex + 1,
                    category: "CLAIMS",
                    emoji: claims.emoji,
                    rawTitle: `⚖️ [제${dIndex + 1}강] ${claims.topic}에 숨겨진 상법 법리와 고객 권리 구제`,
                    summary: `${claims.caseNo} 판결을 토대로 분석한 ${claims.rule}입니다. 기계적인 실무 처리 속에 숨어 있는 가입자의 소중한 재산적 이익을 법리적으로 도출해내는 리더 가이드라인을 제공합니다.`,
                    sourceUrl: claims.sourceUrl,
                    fullContent: `
                        <h3>⚖️ ${claims.topic}에 숨겨진 정밀 분석과 교육적 실무 리포트</h3>
                        <p>보상 실무 현장에서 매일 마주하는 무수한 사건 중, 사법부의 명확한 판단 기준이 확립되어 있음에도 불구하고 여전히 간과되는 <strong>'${claims.caseNo} 판례의 핵심 법리'</strong>를 통해, 프로들이 정립해야 할 전문성을 다뤄봅니다.</p>

                        <h4>1. 논리적 설득을 이끌기 위한 핵심 단어 분석</h4>
                        <p>어려운 법률 용어와 약관 문구를 정교하게 이해하여 고객 대면 시 스피치의 신뢰도를 극대화합니다.</p>

                            <li><strong>상법상의 계약자 우대 해석 원칙</strong>: 약관 문구가 불분명하거나 다의적으로 해석될 때에는 작성자 불이익 원칙을 고수하여, 고객의 법률상 지위를 최우선적으로 방어하도록 명시해 놓은 소비자 보호의 근간입니다.</li>

                        <h4>2. 판결이 내포하고 있는 사실적 법리 분석</h4>

                        <p>해당 선고를 정밀 검토해 보면, 법원은 기계적으로 자사 보장 규정만을 앞세워 면책을 유도하려 한 대형 연합들의 논리를 상법 제655조 및 민법상의 비례공평 원리를 근거로 철저히 논박했습니다. 사고의 근원과 계약의 조항을 입체적으로 교차 분석하여, 약정상의 족쇄를 완전히 털어낼 수 있도록 유도해 낸 기념비적 판결입니다. 이러한 사법부의 확고한 판단 기준이 있으므로, 우리 리더들은 어떠한 난해한 사고 앞에서도 굳건하게 자산을 수호해 낼 수 있습니다.</p>

                        <h4>3. 비즈니스 미팅에서 실전적으로 구동되는 소구 화법</h4>
                        <p><strong>[전문 컨설팅 스크립트]</strong>: "고객님, 흔히 예기치 못한 사고나 재산 손실이 발생하면 앞길이 막막하고 눈앞의 추가 비용 청구에 심적인 고통이 뒤따르기 마련입니다. 약관 규정상에는 고스란히 적혀 있어 당연한 지출로 생각하셨던 부담금도, 고객님 댁에 정교하게 분산 배치해 둔 다각도의 포트폴리오를 대법원의 비례공평 판결 원칙에 맞추어 역으로 치밀하게 증빙해 낸다면, <strong>그 부담 금액이 법적으로 상쇄되어 0원으로 완전 면제</strong>가 가능합니다. 눈앞에 가려져 있어 보이지 않는 법률상 가치와 재정적 권익까지 완벽하게 진단해 드리는 것, 그것이 바로 저와 같은 전문 리더들이 늘 곁에서 비즈니스를 정교하게 설계해 드리는 진짜 가치입니다."</p>
                    `
                },
                industryReport: {
                    id: dIndex + 1,
                    category: industry.category,
                    title: `📢 [제${dIndex + 1}신] ${industry.topic}과 고도의 세일즈 리밸런싱 대응법`,
                    summary: `${industry.bg}으로 도래한 가계 위기 속에서, ${industry.strategy}을 통해 쓸데없는 누수를 완전히 틀어막고 핵심 보장 자산의 탄탄한 보완을 완성하는 완벽한 리더용 솔루션을 소개합니다.`,
                    fullContent: `
                        <h3>📊 ${industry.topic}의 진짜 원인 분석과 선제적 포트폴리오 다이어트</h3>
                        <p>리더 여러분, 최근 공신력 있는 금융 정책 기구에서 대대적으로 강조하고 있는 <strong>'${industry.topic}'</strong>로 인해 가망 시장의 고객분들이 연일 혼란스러움과 불안을 털어놓고 계실 것입니다. "내 지출이 급상승하는 게 아니냐", "기존의 보장을 그대로 쥐고 가도 되는지 두렵다"라며 불안에 잠기는 바로 지금이, 우리에게는 전문가로서 대안적 가치를 선사할 수 있는 절호의 찬스입니다.</p>
                        
                        <h4>1. 이 제도의 심도 있는 시대적 배경 고찰</h4>
                        <p>${industry.bg}으로 인하여 더 이상 이전의 느슨한 포트폴리오 관리는 유지가 불가능한 한계점에 도달해 버렸습니다. 성실하고 완벽하게 자산을 운용해 온 대다수 고객분들까지 불합리한 연대 패널티를 고스란히 짊어지는 모순적인 경제 상황을 원천 개혁하고자, 정책당국과 규제기관은 완전히 새로운 질서와 차등제 지침을 적용하기에 이르렀습니다.</p>
                        <p>이에 따라, 이제는 기계적인 유지나 방치가 아닌 <strong>'정밀한 재무 다이어트와 탄탄한 비갱신 담보의 단단한 상호 결합'</strong>만이 위기를 안심으로 바꾸는 가장 확실하고 안전한 지름길이 되었습니다.</p>
                        <ul>
                            <li><strong>체계적인 분석이 누락된 구형 포트폴리오의 리스크</strong>: 매년 걷잡을 수 없이 치솟아 오르는 고정 세입 지출의 핵심 요인으로 작용하며 가계 경제 전체의 안전성을 무너뜨리는 위험 요소입니다.</li>
                            <li><strong>비갱신형 고정 코어 담보의 견고한 구축</strong>: 아무리 기후와 병원 이용률이 변동하더라도, 단 1원의 인상이나 흔들림 없이 평생 완벽하게 동결되는 한화손해보험만의 굳건한 재무 울타리입니다.</li>
                        </ul>

                        <h4>2. 위기를 위대한 신뢰로 반전시키는 리더의 컨설팅 솔루션</h4>
                        <p>${industry.strategy}</p>
                        <p><strong>[전문 컨설팅 스크립트]</strong>: "고객님, 물가가 가파르게 급상승하는 고금리 장벽 속에서 무작정 불어나는 고정비 지출을 손 놓고 방치하는 것이야말로 재정적으로 가장 취약한 지점입니다. 이제는 철저하게 자산 다이어트를 실행하셔야 할 시점입니다. 변동 폭이 넓어 불안한 실손 보장은 가볍고 영리한 4세대 구조로 정비하여 매월 나가는 현금 흐름을 반값 이하로 완벽하게 다듬어 두십시오. 그리고 그렇게 아낀 아까운 자산 가치를 전환 배치하여, 앞으로 평생의 변동 속에서도 <strong>보험료 인상이 영구 동결되는 단단한 비갱신 수술비와 종합 진단 자산</strong>으로 안전망을 구축하십시오. 청구의 횟수에 비례하여 위협이 따르던 실손의 틈새를 완벽하게 보완하고 완결성 높은 자산을 상속해 드리는 똑똑한 재무 개혁을 저와 함께 설계해 보시길 권해 드립니다."</p>
                    `
                }
            };
        }

        function App() {
            const [selectedNews, setSelectedNews] = useState(null);
            const [todayKST, setTodayKST] = useState("");
            const [isCopying, setIsCopying] = useState(false);

            // 매주 월~금 오전 08:30 KST 자동 감지 알고리즘
            const getBusinessDayIndex = useCallback(() => {
                const now = new Date();
                // KST(UTC+9) 보정
                const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
                const kst = new Date(utc + (3600000 * 9));
                
                let year = kst.getFullYear();
                let month = kst.getMonth();
                let date = kst.getDate();
                let hours = kst.getHours();
                let minutes = kst.getMinutes();
                
                let currentKstMoment = new Date(year, month, date, hours, minutes);
                let target830 = new Date(year, month, date, 8, 30);
                
                // 만약 현재가 당일 08:30 AM 이전이라면 어제의 기준으로 설정
                if (currentKstMoment < target830) {
                    kst.setDate(kst.getDate() - 1);
                }
                
                // 기준 에포크: 2026년 1월 5일 (월요일)
                const epoch = new Date(2026, 0, 5);
                const kstDateOnly = new Date(kst.getFullYear(), kst.getMonth(), kst.getDate());
                
                if (kstDateOnly < epoch) {
                    return 0; // 에포크 이전일 경우 디폴트 0일차
                }
                
                // 주말 처리 (토요일=6, 일요일=0일 경우 이전의 금요일로 복원하여 주중 마지막 리포트 고정 제공)
                let currentDayOfWeek = kst.getDay();
                if (currentDayOfWeek === 6) { // 토요일
                    kst.setDate(kst.getDate() - 1);
                } else if (currentDayOfWeek === 0) { // 일요일
                    kst.setDate(kst.getDate() - 2);
                }
                
                // 보정된 날짜 기준 에포크 차이 계산
                const finalKstDateOnly = new Date(kst.getFullYear(), kst.getMonth(), kst.getDate());
                let msecDiff = finalKstDateOnly.getTime() - epoch.getTime();
                let daysDiff = Math.floor(msecDiff / (24 * 60 * 60 * 1000));
                
                // 비즈니스 요일(월~금)만 누적 계산
                let weeks = Math.floor(daysDiff / 7);
                let remainingDays = daysDiff % 7;
                let businessDays = weeks * 5;
                
                for (let i = 0; i < remainingDays; i++) {
                    let d = new Date(epoch.getTime() + (weeks * 7 + i) * 24 * 60 * 60 * 1000);
                    let dayOfWeek = d.getDay();
                    if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                        businessDays++;
                    }
                }
                
                // 100일 기준으로 순환 적용 (0 ~ 99)
                return businessDays % 100;
            }, []);

            // 실시간 날짜 디스플레이 업데이트 데몬 구동
            useEffect(() => {
                const updateTimeInfo = () => {
                    const now = new Date();
                    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
                    const kst = new Date(utc + (3600000 * 9));
                    const year = kst.getFullYear();
                    const month = String(kst.getMonth() + 1).padStart(2, '0');
                    const day = String(kst.getDate()).padStart(2, '0');
                    setTodayKST(`${year}. ${month}. ${day}`);
                };
                
                updateTimeInfo();
                const timer = setInterval(updateTimeInfo, 60000);
                return () => clearInterval(timer);
            }, []);

            // 감지된 일차에 해당하는 100% 무중복 활성 리포트 가져오기
            const activeData = useMemo(() => {
                const dayIdx = getBusinessDayIndex();
                return DAILY_DATA_BANK[dayIdx] || DAILY_DATA_BANK[0];
            }, [getBusinessDayIndex, todayKST]);

            useEffect(() => {
                document.body.style.overflow = selectedNews ? 'hidden' : 'unset';
                return () => { document.body.style.overflow = 'unset'; };
            }, [selectedNews]);

            const handleCopyText = (htmlContent) => {
                const cleanText = htmlContent.replace(/<[^>]*>/g, '').trim();
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(cleanText)
                        .then(() => { setIsCopying(true); setTimeout(() => setIsCopying(false), 2000); })
                        .catch(() => fallbackCopyText(cleanText));
                } else {
                    fallbackCopyText(cleanText);
                }
            };

            const fallbackCopyText = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed"; textArea.style.left = "-999999px";
                document.body.appendChild(textArea); textArea.focus(); window.scrollTo(0,0); textArea.select();
                try { document.execCommand('copy'); setIsCopying(true); setTimeout(() => setIsCopying(false), 2000); } catch (err) {}
                document.body.removeChild(textArea);
            };

            const CategoryTag = ({ type }) => {
                const configs = {
                    HANWHA: { label: "한화 독점 소식", color: "bg-orange-500", icon: "sun" },
                    FSS: { label: "금감원 정책 가이드", color: "bg-blue-600", icon: "shield-check" },
                    CLAIMS: { label: "손해사정 판례특보", color: "bg-red-600", icon: "scale" },
                    ECONOMY: { label: "생활 경제 인사이트", color: "bg-emerald-600", icon: "trending-up" },
                    MOTIVATION: { label: "모닝 비즈니스 에세이", color: "bg-rose-500", icon: "flame" },
                };
                const config = configs[type] || configs.HANWHA;
                return (
                    <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[9px] font-black text-white uppercase tracking-wider ${config.color}`}>
                        <CustomIcon name={config.icon} size={10} /> {config.label}
                    </span>
                );
            };

            return (
                <div className="min-h-screen pb-12 bg-[#F9F9FB]">
                    {/* 상단 네비게이션 바 */}
                    <nav className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm">
                        <div className="max-w-2xl mx-auto px-4 h-16 flex items-center justify-between gap-2">
                            <div className="flex items-center gap-1.5">
                                <div className="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center shadow-md shadow-orange-200">
                                    <CustomIcon name="sun" className="text-white" size={16} />
                                </div>
                                <span className="font-black text-lg tracking-tighter uppercase text-gray-900">Leaders <span className="text-orange-500 font-medium">Insight</span></span>
                            </div>
                            <div className="flex items-center gap-1.5 text-gray-500 font-bold text-xs bg-gray-50 border border-gray-100 rounded-full px-3 py-1">
                                <CustomIcon name="clock" size={13} className="text-orange-500" />
                                <span>KST 08:30 Auto-Refresh</span>
                            </div>
                        </div>
                    </nav>

                    {/* 메인 뉴스레터 피드 */}
                    <main className="max-w-2xl mx-auto px-4 py-8 space-y-10 animate-slide-up">
                        <header className="space-y-2">
                            <div className="flex items-center gap-1.5">
                                <div className="p-1 bg-orange-100 rounded text-orange-600"><CustomIcon name="flame" size={12} /></div>
                                <span className="text-[10px] font-black text-orange-600 uppercase tracking-widest">morning boost portal</span>
                            </div>
                            <h2 className="text-2xl md:text-3xl font-black leading-tight tracking-tight text-gray-900">아침을 깨우는<br/><span className="text-orange-500">오늘의 뉴스레터</span></h2>
                            <p className="text-gray-400 font-semibold text-[11px] leading-relaxed">
                                매주 월요일부터 금요일 오전 8시 30분, 실시간 정밀 판정 엔진이 작동하여 리더 분들을 위한 독점 보상 리포트와 비즈니스 정수들을 무중복 업데이트합니다.
                            </p>
                        </header>

                        {/* 비즈니스 영감 스토리 보드 */}
                        <section className="group relative h-[420px] rounded-[2rem] overflow-hidden shadow-xl shadow-gray-200 bg-black cursor-pointer"
                                 onClick={() => setSelectedNews({ ...activeData.motivation, category: 'MOTIVATION', title: activeData.motivation.text })}>
                            <img src={activeData.motivation.image} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 opacity-85" alt="" />
                            <div className="absolute inset-0 bg-gradient-to-t from-gray-950 via-gray-950/50 to-transparent" />
                            <div className="absolute bottom-0 left-0 p-6 w-full space-y-3">
                                <CategoryTag type="MOTIVATION" />
                                <h3 className="text-lg md:text-2xl font-black text-white leading-snug break-keep">{activeData.motivation.text}</h3>
                                <p className="text-white/80 text-xs leading-relaxed break-keep line-clamp-4">{activeData.motivation.subText}</p>
                                <div className="pt-2 flex items-center gap-1 text-[10px] font-black text-orange-400 uppercase tracking-widest">분석 에세이 원문 읽기 <CustomIcon name="external-link" size={10} /></div>
                            </div>
                        </section>

                        {/* 판례 및 규정 리포트 */}
                        <section className="space-y-4">
                            <div className="flex items-center gap-1.5 text-gray-900 pb-1">
                                <div className="p-1.5 bg-gray-100 rounded-lg"><CustomIcon name="book-open" size={16} /></div>
                                <h3 className="font-black text-lg tracking-tight text-gray-900">오늘의 종합 교육 매뉴얼</h3>
                            </div>
                            
                            <div className="grid grid-cols-1 gap-4">
                                <div onClick={() => setSelectedNews(activeData.claimsReport)} className="group flex items-start gap-4 p-6 bg-white rounded-2xl border border-gray-100 hover:border-red-200 hover:shadow-xl transition-all cursor-pointer">
                                    <div className="shrink-0 w-11 h-11 rounded-xl flex items-center justify-center bg-red-50 text-red-600 group-hover:bg-red-500 group-hover:text-white transition-all"><CustomIcon name="scale" size={20} /></div>
                                    <div className="flex-1 space-y-2 min-w-0">
                                        <CategoryTag type="CLAIMS" />
                                        <h4 className="text-base font-black text-gray-900 group-hover:text-red-700 transition-colors break-keep leading-snug">{activeData.claimsReport.rawTitle}</h4>
                                        <p className="text-xs text-gray-500 leading-relaxed line-clamp-4">{activeData.claimsReport.summary}</p>
                                        <div className="pt-1 flex items-center gap-0.5 text-[10px] font-black text-red-600">학술적 판례 해설 및 스크립트 보기 <CustomIcon name="external-link" size={9} /></div>
                                    </div>
                                </div>

                                <div onClick={() => setSelectedNews(activeData.industryReport)} className="group flex items-start gap-4 p-6 bg-white rounded-2xl border border-gray-100 hover:border-orange-200 hover:shadow-xl transition-all cursor-pointer">
                                    <div className="shrink-0 w-11 h-11 rounded-xl flex items-center justify-center bg-orange-50 text-orange-500 group-hover:bg-orange-500 group-hover:text-white transition-all"><CustomIcon name={activeData.industryReport.category === 'FSS' ? 'shield-check' : 'sun'} size={20} /></div>
                                    <div className="flex-1 space-y-2 min-w-0">
                                        <CategoryTag type={activeData.industryReport.category} />
                                        <h4 className="text-base font-black text-gray-900 group-hover:text-orange-600 transition-colors break-keep leading-snug">{activeData.industryReport.title}</h4>
                                        <p className="text-xs text-gray-500 leading-relaxed line-clamp-4">{activeData.industryReport.summary}</p>
                                        <div className="pt-1 flex items-center gap-0.5 text-[10px] font-black text-orange-500">시장 전망 및 포트폴리오 가이드 보기 <CustomIcon name="external-link" size={9} /></div>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>

                    {/* 정밀 모달 팝업 레이어 */}
                    {selectedNews && (
                        <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center p-0 md:p-4">
                            <div className="absolute inset-0 bg-gray-950/70 backdrop-blur-sm" onClick={() => setSelectedNews(null)} />
                            <div className="relative bg-white w-full max-w-2xl h-[88vh] md:h-auto md:max-h-[85vh] overflow-hidden rounded-t-3xl md:rounded-3xl shadow-2xl flex flex-col z-10 animate-slide-up">
                                <div className="sticky top-0 bg-white/95 backdrop-blur-md border-b border-gray-100 px-5 py-4 flex items-center justify-between z-20">
                                    <div className="flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-orange-500 animate-pulse" />
                                        <span className="text-[10px] font-black text-gray-400 uppercase tracking-wider">{selectedNews.category} Educational Document</span>
                                    </div>
                                    <button onClick={() => setSelectedNews(null)} className="p-1.5 hover:bg-gray-100 rounded-xl text-gray-400"><CustomIcon name="x" size={20} /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 md:p-10 custom-scrollbar">
                                    <div className="space-y-6">
                                        <h2 className="text-xl md:text-2xl font-black text-gray-900 leading-snug break-keep">{selectedNews.title || selectedNews.rawTitle}</h2>
                                        <div className="article-body" dangerouslySetInnerHTML={{ __html: selectedNews.fullContent }} />
                                        
                                        {selectedNews.sourceUrl && (
                                            <div className="p-4 bg-slate-50 border border-slate-100 rounded-xl flex flex-col gap-3">
                                                <div className="flex items-center gap-2">
                                                    <div className="p-2 bg-white rounded-lg text-gray-400 shadow-sm"><CustomIcon name="file-text" size={16} /></div>
                                                    <div>
                                                        <p className="text-xs font-black text-gray-900">대한민국 법원 종합법률정보 판례 고증</p>
                                                        <p className="text-[10px] text-gray-400">대법원 선고 원본 데이터 연동</p>
                                                    </div>
                                                </div>
                                                <a href={selectedNews.sourceUrl} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-1.5 w-full py-2.5 bg-gray-900 text-white rounded-lg text-xs font-black hover:bg-black transition-all">공식 판결문 원본 확인하기 <CustomIcon name="external-link" size={11} /></a>
                                            </div>
                                        )}
                                        
                                        <div className="p-4 bg-orange-50/50 border-l-4 border-orange-500 text-[11px] text-gray-500 font-medium leading-relaxed rounded-r-xl">
                                             💡 본 교육자료는 리더 분들의 전문 역량 강화와 신뢰도 높은 리서치 지원을 목적으로 기획되었습니다. 비즈니스 미팅 세미나 및 고객 세션 자료로 인용하여 활용하시기 바랍니다.
                                        </div>

                                        <div className="pt-6 border-t border-gray-100 space-y-3">
                                             <button onClick={() => handleCopyText(selectedNews.fullContent)} className="w-full flex items-center justify-center gap-2 py-4 bg-orange-500 text-white font-black rounded-xl hover:bg-orange-600 transition-all shadow-md text-sm">
                                                 <CustomIcon name={isCopying ? "check" : "copy"} size={14} />
                                                 {isCopying ? "텍스트가 클립보드에 복사되었습니다!" : "본문 내용 전체 복사하기 (미팅 제안 / 텍스트 배포용)"}
                                             </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
